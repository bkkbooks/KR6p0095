body:
  text: 淨土果證王龍舒云東晉遠法師倡首修淨土逮後王敏仲侍郎及錢塘陸居士遍集感應事跡凡二百餘傳皆鏤板流傳今不及盡載取其齊戒修者及中人修者及罪惡人修者及疾苦中修者愚復附入近代所耳聞目擊其中各有奇驗異應者録之所以發人之信心也沙門往生類慧遠祖師晉慧遠雁門樓煩人博綜六經尤善莊老聞安法師講般若經豁然大悟因剃染事之太元六年過潯陽見廬山閒曠可以息心遂感山神現夢一夕雷雨材木自至刺史桓伊乃為建殿名曰神運以慧永先住西林故號東林焉遠住東林三十年跡不入俗克志西方與高僧巨儒百四十人結為淨社蓮漏六時禮誦不輟遠澄心觀想初十一年三覩聖相沉厚不言後十九年七月晦夕方從定起見阿彌陀佛身滿虗空圓光之中無量化佛觀音勢至侍立左右又見水流光明分十四支一一支水洄注上下演說妙法佛告遠曰我以本願力故來安慰汝後七日當生我國又見佛䭾耶舍慧持慧永曇順劉遺民等在佛之側向前揖遠曰法師之志在吾先何來之遲也遠目見分明與其徒言之且曰始吾居此十一年幸三覩聖相今復見之吾生淨土決矣次日寢疾至七日端坐入寂年八十二時義熙十二年八月六日也慧永晉慧永河內人十二出家既而與遠公同依安法師太元初駐錫廬山刺史陶範捨宅為西林以居之絶志塵囂標心安養後義熙十年示疾忽斂衣求屣欲起衆驚問答曰佛來迎我言訖而化異香七日方滅唐玄宗追諡覺寂大師曇順晉曇順黃龍人幼從羅什法師講釋羣經什嘆曰此子奇器也後入廬山修淨業時寧蠻校尉劉遵孝創寺江陵延順經始盛弘念佛三昧宋元嘉二年別衆坐逝異香滿室焉僧睿晉僧睿冀州人遊學諸方遠歷天竺還關中從羅什法師稟受經義後預廬山蓮社宋元嘉十六年忽告衆曰吾將行矣面西合掌而化衆見睿榻前一金蓮華倐爾而隱五色香煙從其房出道昞晉道昞頴川人幼師遠公通經律言與行合念佛三昧究心無間義熙十四年豫章大守王䖍入山謁敬請紹遠師入席衆咸宗仰元嘉十二年集衆念佛就座而化道敬晉道敬琅琊人祖凝之刺江州因從遠公出家年十七博通經論日記萬言篤志念佛蚤夜弗替宋永初元年謂衆曰先師見命吾其行矣端坐唱佛而化衆見光明滿室彌時方滅佛䭾跋陀羅晉佛䭾跋陀羅此云覺賢迦維衛國人甘露飯王之裔也年十六博學羣經深達禪律姚秦沙門智嚴至西域要師達長安演法東宮與羅什法師上下論議後入廬山預遠公蓮社譯出觀佛三昧諸經宋元嘉六年念佛而化僧濟晉僧濟入廬山從遠公學遠嘆曰紹隆大法其在爾乎後疾篤誠期淨土遠遺燭一枝曰汝可運心安養濟執燭𠙥几停想無亂又集衆諷淨土經五更濟以燭授弟子元弼令隨衆行道頃之覺自秉一燭乘空而行見阿彌陀佛接置于掌遍至十方歘然而覺且悲且慰自省四大了無疾苦明夕忽起立目逆虗空如有所見須臾還臥容色愈悅謂旁人曰吾行矣右脅而逝時方炎暑三日而體不變異香郁然慧恭晉慧恭豫章鄷城人與慧蘭僧光等同學蘭光繫念淨土臨終皆有奇應又五年恭病篤雨淚叩頭誓心安養念不少間見阿彌陀佛以金臺相迎恭乘其上又見蘭等于臺上光明中告曰長老受生已居上品吾等不勝喜慰恨五濁淹延相依之晚耳恭欣然奮迅而逝慧䖍晉慧䖍少出家戒行精確義熙年中投山陰嘉祥寺苦身率衆後寢疾屬想安養祈誠觀音北寺有淨嚴尼者宿德篤行夜夢觀音從西郭門入清輝妙狀光映日月幢幡華蓋七寶莊嚴尼驚異作禮問大士何往答云往嘉祥迎䖍公耳䖍疾雖困神色如常侍者皆聞異香泊然而化智仙晉智仙法師號真教住白蓮寺十三年西向十念十二時不暫廢一夕微疾命觀堂行人誦彌陀經未終卷安然坐脫慧通晉慧通從涼州慧紹禪師咨受禪法祈心安養微疾于禪定中見一人形甚端嚴語通云良時至矣俄而見阿彌陀佛光明燁然定起以告同學安然而化異香三日乃歇法琳晉法琳臨卭人專精戒品止成都靈建寺修淨業常持彌陀觀音二經轉誦之時輒見一偉貌沙門屹然在前建武二年寢疾注念西方禮懺不息見諸賢聖皆集合掌而逝曇鑒宋曇鑒平生片善回向西方誓願見佛一日定中見阿彌陀佛水灑其面曰滌汝塵垢浴汝心念及汝身口皆悉嚴淨又于瓶中出蓮華一枝授之定起乃與寺僧敘別夜漸深獨步廊下念佛至五鼓其聲彌厲及明弟子依常問訊趺坐不動就而視之逝矣僧柔齊僧柔學方等諸經惟以淨業為懷卒之日見化佛千數室內外俱聞異香向西敬禮而化慧光齊慧光居洛陽著華嚴涅槃十地等疏妙盡權實之旨一日有疾見天衆來迎光曰我所願歸安養耳已而淨土化佛充滿虗空光曰惟願我佛攝受遂我本願即彈指罄咳言氣俱盡慧進南齊楊都僧慧進年四十餘居高座寺誓誦法華執卷病生乃發願造百部以懺業障化錢造畢病亦隨愈願以造經功德回向淨土忽空中有聲云汝事已辦願亦已遂其生淨土非汝而誰進答曰進不敢以冀上品但下品之下亦無退轉矣齊明三年年八十無疾而卒道珍法師梁道珍法師講涅槃經天監中憩錫廬山慕遠公淨業禪坐中忽見海上數百人乘寶舫前邁師問何之答曰往極樂國因求附載報云法師雖善講涅槃經然未誦彌陀經豈得同往師遂廢講念佛誦彌陀經歷年不輟將終四七日前夜四鼓見西方銀臺來至空中皎如白日聲云法師當乘此臺往生時衆咸聞天樂異香數日不散神鸞後魏曇鸞少遊五臺感靈異出家而性嗜長生受陶隱君仙經十卷後遇菩提流支乃問曰佛有長生不死術乎支笑曰長生不死吾佛道也乃授十六觀經曰學此則三界無復生六道無復往其為壽也河沙劫石莫能比焉此吾金仙氏之長生也鸞大喜遂焚仙經而修淨業寒暑疾痛曾無少懈魏主號為神鸞一夕室中見梵僧謂曰吾龍樹也久居淨土以汝同志故來相見鸞自知時至集衆教誡曰勞生役役其止無日地獄諸苦不可以不懼九品淨業不可以不修因令弟子高聲念佛西向稽顙而終衆聞天樂自西而來良久乃已智者大師隋智顗號智者大師姓陳氏頴川人目有重瞳孩幼見佛即禮逢僧必拜十八出家于果願寺誦法華經兼通律藏往大蘇山禮慧思禪師師一見乃曰昔日靈山同聽法華今復來矣因授與法華三昧三七日身心豁然晚入天台降魔進行化緣既息于新昌大石像前示疾告滅弟子請問生方乃曰吾諸師友侍從觀音皆來迎我臨終說諸法門令唱無量壽佛乃顧大衆合掌讚曰四十八願莊嚴淨土華池寶樹易往無人火車相現一念改悔尚得往生況戒定熏修聖行道力功不唐捐言訖稱三寶名如入三昧法喜隋法喜常行方等懺法忽一雉索命有神人呵曰法師當往生淨土豈償汝命後于病中發願以一生行業回向西方至心念佛即見佛菩薩來迎端坐而化道喻隋道喻居開覺寺念阿彌陀佛日夜不廢造像僅三寸後于定中見佛謂曰汝造我像何小喻曰心大即大心小即小言訖見像身遍滿虗空告曰汝當澡浴清淨明星出時我來迎汝至時果見佛來光明滿室遂坐而化智舜隋智舜入廬山踵遠師淨業大業初講觀經畢即示疾見鸚鵡孔念佛法僧出微妙音告弟子曰我今日往生矣安然而逝慧海隋慧海住江都安樂寺善經論精誠念佛有僧道銓者至自齊州齎阿彌陀佛像微妙工巧世所未有問之則云此天竺雞頭摩寺五通菩薩乘空往彼安樂世界圖繪而來海感慶逢遇䖍篤禮敬乃覩神光照爍于是模寫懇苦願生彼國後微疾夜忽起依常面西禮竟跏趺至曉而逝儼然如生二沙彌隋汶州二沙彌同志念佛長者忽亡至淨土見佛白言有小沙彌同修可得生否佛言由彼勸汝汝方發心汝今可歸益勤淨業三年之後當同來此至期二人俱見佛來大地震動天華飄舞一時同化善導和尚唐善導貞觀中見西河綽禪師淨土九品道場喜曰此真入佛之津要修餘行業迂僻難成惟此法門速超生死于是篤勤精苦若救頭然每入佛堂合掌胡跪一心念佛力竭不休雖寒氷亦須流汗以表至誠出即為衆演說淨土三十餘年不暫睡眠護持戒品纖毫不犯飲食衣服有餘並以回施好食送大厨供衆粗惡自食諸有䞋施用寫阿彌陀佛經十萬餘卷𦘕淨土變相三百餘壁見壞寺及塔皆悉修營然燈續明每歲不絶三衣瓶鉢不使人持洗不與衆同行恐談世事妨修行業展轉相授有誦彌陀經十萬至五十萬遍者有念佛日課萬聲至十萬聲者得念佛三昧往生者不可勝紀或問導云念佛得生淨土否答云如汝所念遂汝所願于是導自念阿彌陀佛一聲則有一道光明隨其口出十聲以至百聲光明亦如此其勸化偈云漸漸雞皮鶴髮看看行步躘蹱假饒金玉滿堂難免衰殘老病任汝千般快樂無常終是到來唯有徑路修行但念阿彌陀佛後謂人曰此身可厭吾將西歸乃登寺前柳樹投身而逝高宗皇帝知其事賜寺額為光明智欽唐智欽專習禪業又禮念萬五千佛名乃至百遍後于柳州阿育王塔前然一臂求生淨土弟子僧護夜半見庭前光照異常因問何人秉炬凡三問空中聲曰來迎欽禪師耳護急啓窗見佛身光明幡華寶蓋滿虗空中欽隨佛冉冉而去五會法師唐法照大歷二年止衡州雲峰寺慈忍戒定為時所宗嘗于鉢內覩五色雲有梵剎曰大聖竹林寺後詣五臺見異光果得竹林寺入講堂則文殊在西普賢在東萬衆圍繞而為說法照作禮問曰末代凡夫未審修何法門文殊告曰諸修行門無如念佛我以念佛得一切種智又問當云何念曰此世界西有阿彌陀佛彼佛願力不可思議汝當繼念毋令斷絶決定往生後臘月朔在華嚴院淨業道場方憶二大士記我往生乃一心念佛忽見梵僧佛陀波利謂曰汝華臺已就後三年華開矣至期謂衆曰吾行矣端坐而逝師嘗于湖東寺開五會念佛感祥雲寶閣覩阿彌陀佛及二菩薩身滿虗空又于并州五會念佛感代宗皇帝宮中聞念佛聲遣使追尋乃見師勸化之盛遂詔入京教宮人念佛亦及五會號五會法師臺岩康法師唐少康縉雲仙都人十五通法華楞嚴貞元中因詣洛陽白馬寺見殿中文字放光探之則善導和尚西方化導文也師祝曰若于淨土有緣當更放光言已光明閃爍師曰劫石可磨我願無易矣遂至長安光明寺善導和尚影堂瞻禮忽聞空中謂曰汝依我教廣化有情他日功成必生安養乃適新定乞錢誘小兒念佛念佛一聲與錢一文年餘無少長貴賤見師者皆稱阿彌陀佛念佛之聲盈滿道路又于烏龍山建淨土道場每升座高聲唱佛衆見一佛從其口出十聲則有十佛若連珠狀師曰汝見佛者必得往生時衆數千有不見者悲傷自責因倍精進後二十一年十月三日囑道俗曰當于淨土起欣樂心于閻浮提起厭離心汝曹此時見我光明真我弟子遂放異光數道而逝塔于臺子岩號臺岩法師自覺唐自覺住真州常發願願因觀音得見阿彌陀佛于是鑄觀音像高四十九尺既成祝願夜三更忽有金光二道阿彌陀佛自光中而下二大士左右隨之佛垂手摩覺頂曰守願勿易利物為先寶池生處孰不如願後十一年七月望夕見一人形似天王雲間現身謂覺曰安養之期至矣即于觀音像前趺坐而化善胄唐善胄瀛州人武德三年病革謂門人曰吾一生正信不慮淨土不生即令拂拭房宇燒香嚴待病久委臥忽起坐合掌語侍人曰安置世尊令坐又自陳懺悔良久曰世尊去矣低身似送因臥曰向者阿彌陀佛來汝等還見否不久吾當去耳少頃而逝懷玉唐懷玉台州人注想淨業近四十年布衣一食常坐不臥誦彌陀經三十萬遍日課佛號五萬聲天寶元年念佛間忽見佛菩薩滿虗空中有一人手擎銀臺前以示玉玉曰吾一生念佛本望金臺何為不然聖衆遂隱玉彌加精進至三七日向擎臺者復來告云師以精進得升上品上品往生必先見佛可趺坐以俟佛來未旋踵間異光滿室又三日異光再發謂弟子曰若聞異香我報身即盡次日書偈云清淨皎潔無塵垢蓮華化生為父母我經十劫修道來出示閻浮厭衆苦一生苦行超十劫永離娑婆歸淨土偈畢香氣四來弟子有見佛與二菩薩共乘金臺臺旁千百化佛自西而下迎玉玉恭敬合掌含笑長歸道昂唐道昂魏郡人師靈裕法師常于寒陵山寺講華嚴地論稽洽博詣志結四方願生安養後自知命極預期八月人未之測也至八月朔日無所患問齊時至未即升高座身含奇相爐發異香引四衆受菩薩戒詞理切至昂舉目高視見天衆繽紛管絃嘹喨告衆曰兜率陀天迎我然天道乃生死根本由來非願常祈心淨土如何此誠不果遂耶言訖天樂還滅便見西方香華伎樂充塞如雲飛湧而來旋環頂上舉衆皆見昂曰今西方靈相來迎事須願往但見香爐墜手即于高座而逝足下有普光堂等字遐邇驚嘆道綽唐道綽并州汶水人十四出家習經論晚事瓚禪師學禪又篤志神鸞淨土之業有僧定中見綽數珠如七寶大山平居為衆講無量壽觀經將二百遍人各掐珠口稱佛號或時散席嚮彌林谷六時敬禮初不廢缺念佛日以七萬為限貞觀二年四月八日歸寂聞而赴者滿于山寺見化佛住空天華下散焉惟岸唐惟岸并州人專修十六觀因出見觀音勢至二菩薩現于空中良久不滅岸頂禮雨淚而嘆曰幸由肉眼得見聖容所恨後世無傳忽有二人自稱𦘕工未展臂間聖相克就已而人亦不見弟子怪而問之岸曰此豈𦘕工哉又曰吾今往生誰偕行者小童子云願從師往岸曰可歸告父母父母聞而笑罵之子乃歸寺香湯沐浴于阿彌陀佛像前趺坐而化岸撫其背曰小子何乃先去遂索筆焚香向所𦘕菩薩前作偈云觀音助遠接勢至輔遙迎寶瓶冠上顯化佛頂前明俱遊十方剎持華候九生願以慈悲手提獎共西行遂令弟子助聲念佛仰目西顧而亡啓芳圓果唐啓芳圓果汾州人時有并州僧衒初念慈氏期上生內院年九十遇道綽禪師得聞淨土始回心念佛日禮千拜後有疾告弟子曰阿彌陀佛授我香衣觀音勢至示我寶手言訖而逝七日異香不散二師目擊斯事乃于悟真寺共折楊枝于觀音手中祝曰若于淨土有緣當七日不萎至期益茂芳果慶忭精心觀想淨土于觀想中同覺身臨七寶池池間有大寶帳見觀音勢至坐二大寶蓮華下有蓮華瀰漫千萬阿彌陀佛從西來坐一最大蓮華迭出光明相照芳果禮佛問云閻浮衆生依經教念佛得生此否佛云如念我名皆生我國無有一人念而不生者又聞釋迦世尊與文殊菩薩以梵音聲稱讚淨土前又有大殿殿有三道寶階第一純是白衣第二僧俗相半第三唯僧無俗佛指謂芳果曰此皆南閻浮提念佛衆生遂生于此芳果既寤歷與其徒言之後五月二人無病遽聞鐘聲他人不聞芳果云鐘聲乃我事俱時化去辨才唐辨才襄陽人潛修淨土二十年未嘗自稱獨與護戎任公善謂之曰才必生淨土期在十年一日令弟子報任公曰向所期已及任公至才曰吾去矣趺坐而化衆聞仙樂西來異香散漫法祥唐法祥住楊都大興國寺三十年修安養之業凡有饒益必用回向因疾弟子聞祥稱佛聲甚厲又見房西壁有光若鏡現淨土相頻伽鼓翼乃倐然而化大行唐大行居泰山修普賢懺法三年感大士現身晚歲入大藏陳願隨手取卷得彌陀經晝夜誦咏至三七日覩琉璃地上佛及二大士現身僖宗皇帝聞其事詔入內賜號常精進菩薩後一年琉璃地復現即日而終異香經旬肉身不壞明瞻唐明瞻晚歲克志安養或譏其遲暮瞻曰十念功成猶得見佛吾何慮乎後因疾于興教寺具齊別道俗時僕射房玄齡杜如晦皆與焉日過午整威儀念佛遽曰佛來矣二大士亦至竦身合掌而化志通石晉志通鳳翔人因見智者大師淨土儀式不勝欣忭自是不向西唾不背西坐專心念佛後見白鶴孔成行西下又見蓮華開合于前通云白鶴孔淨土境也蓮華光相受生處也淨土現矣乃起禮佛而終茶毗有五色祥雲環覆火上舍利鱗砌于身永明壽禪師錢氏吳越禪師延壽本丹陽人後遷餘杭少誦法華初為縣衙校多折官錢勘之止是買放生命罪當死引赴市曹錢忠懿王使人探之若顏色變即斬之不變來奏臨斬顏色不變乃貸命遂為僧參天台韶國師發明心要于禪觀中見觀音以甘露灌其口乃獲辨才下筆盈卷著萬善同歸集宗鏡録共數百卷嘗中夜見普賢蓮華忽然在手因思宿願未決登智者岩作二鬮一曰一心禪定一曰萬行修淨土冥心精禱七拈皆得淨土于是一意專修後住永明日課利益一百八事夜往別峰行道念佛旁人時聞螺貝天樂之音忠懿王嘆曰自古求西方未有如此之專切者也乃立西方香嚴殿以成其志開寶八年二月二十六日晨起焚香告衆趺坐而化茶毗畢為一塔有僧每日繞塔禮拜人問其故僧云因病至陰府命未盡放還見殿左有僧像一軸閻羅王自來頂拜問此是何人主吏云杭州永明寺壽禪師也凡人死者皆經此處唯此人不經此處已于西方極樂世界上品上生王敬其人供養于此以此見精修西方者為陰府所重省常法師宋省常錢塘顏氏子十七出家受具戒行謹嚴通大乘起信習天台止觀續廬山遠公遺風淳化中住杭州西湖昭慶寺專修淨業結淨行社相國向公王文正公旦為社首士大夫與會者凡百二十人皆自稱淨行弟子一時比丘殆千人焉師乃發誓願云我與一千大衆始從今日發菩提心窮未來際行菩薩行願盡此報身以生安養國翰林承旨宋白撰翰林學士蘇易簡作淨行品序至謂豫當布髮以承其足剜身以請其法猶尚不辭狀元孫何題社客于陰孤山圓法師撰師行業天禧四年正月十二日端坐念佛有頃厲聲唱云佛來也泊然而化淨觀宋淨觀住嘉禾寂光菴修淨土懺法十餘年謂弟子曰我後二十七日行矣至期二日前見紅蓮華次日又見黃華滿室皆有化生孩兒坐于華上仙帶結束三日入龕端坐命衆念佛頃之脫去慈雲懺主宋遵式台州臨海縣人學行高古名冠兩浙專志安養嘗行般舟三昧九十日苦學嘔血入道場兩足皮裂以死自誓忽如夢中見觀音垂手指其口引出數蟲又指端出甘露注其口覺身心清涼疾遂愈著淨土決疑行願及淨土懺法行于世天聖間將化之日炷香禮佛願諸佛證明往生安養至晚坐脫人見大星隕于靈鷲峰時號慈雲懺主云潞府宗坦疏主宋宗坦潞州黎城人申姓年十六落髮受具少通義學垂五十年名播講林晚于唐鄧汝頴之間講淨土觀經勸人念佛求生安養聽者如雲皆稟淨業政和四年四月二十七日夢阿彌陀佛告曰汝說法止六日當生淨土覺而白衆曰吾修求安養似得因緣相應適來佛告我得生淨土敢不信乎次日雖覺不豫講唱不輟五月四月丑時自知時至乃鳴鐘集衆告曰因緣聚散固當有時淨土勝緣惟憑時刻幸望大衆念佛助往言訖坐滅滿空雷鳴白雲覆地三日方歇師先有瑪瑙數珠一串臨終盤于指上衆人竟不能取慈照宗主宋子元號萬事休平江崑山茅氏子母夜夢佛入門次旦遂生因名佛來十九歲落髮習止觀一日定中聞鴉聲悟道乃有頌曰二十餘年紙上尋尋來尋去轉沉吟忽然聽得慈鴉呌始信從前錯用心于是利他心切慕遠公蓮社遺風普勸念佛受持五戒一不殺二不盜三不淫四不妄五不酒念阿彌陀佛五聲以證五戒普結淨緣欲令世人淨五根得五力出五濁也乃撮集大藏要言編成白蓮懺儀為法界衆生晨朝懺悔祈生安養四十六歲障臨江州逆順境中未嘗動念乾道二年高宗詔至德壽殿演說淨土法門賜號慈照宗主三月二十三日于鐸城倪建宅告諸徒曰吾化緣已畢時當行矣言訖合掌辭衆奄然示寂二十七日茶毗舍利無數塔于松江吳覺昌宅勑賜最勝之塔法持宋法持居化度寺修彌陀懺願促閻浮之壽早生安養後小疾雨淚悲號祈垂接引厲聲念佛不絶忽見佛身丈六立于池上即自言曰我已得中品生西向而化本如宋本如號神照住東山承天寺與郡守張郇結社一日升座說法與衆訣別退而坐逝時江上漁人見雲端有僧西去明年啓塔顏貌如生蓮華産于塔前基法師宋基法師學于寶雲住太平興國寺精意念佛一日示疾為弟子廣談玄旨衆忽見西方現光空中奏樂師曰阿彌陀佛與二大士俱至即右脅向西而化門人夢阿彌陀佛授記為超世如來或夢師坐青蓮華臺者法智禪師嘆曰臥病談玄臨終見佛是可敬也若愚宋若愚居雲川仙潭建無量壽閣勸道俗念佛精勤三十年與道潛則章二師為友潛能詩近名愚與章惟務實行將順世夢神人告曰汝同學則章得普賢行願三昧已生淨土彼正待汝愚乃沐浴更衣命衆諷觀經端坐默然忽云淨土現前吾當行矣書偈而化偈曰空裏千華羅網夢中七寶蓮池踏得西方路穩更無一點狐疑守真宋守真永興人講起信論法界觀常于中夜結無量壽佛往生祕密印繫念西方一夕天曉自覺身登淨土舉目見佛因俯伏像前忽曰四十八願能度我者乃持香華入殿供養就坐而化有嚴宋有嚴住台州赤城崇善寺依神照學天台教晚年結茆樝木之下號曰樝菴平生篤修淨業有懷安養故鄉詩為時所傳建中靖國元年夏四月將終見寶池大蓮華天樂四列乃作餞歸淨土詩示衆後七日跏趺而化塔上有光如月三夕方隱師贊宋師贊雍州人為僧童年十四念佛不絶忽遇疾暴亡俄而復蘇謂師及父母曰阿彌陀佛來此兒當隨行鄰人見空中寶臺五色異光向西而沒智廉宋智廉居上虞化度寺初遍參宗門晚節一意西方慶元改元秋八月別衆曰我夢中見阿彌陀佛大衆圍繞說法佛云諸善人等當須專心淨業來生我國我見勝相往生必矣乃書偈曰雁過長空影沉寒水無滅無生蓮華國裏書畢回身向西結印而逝智深宋智深號慈川學于海月歸嘉禾開長堂供衆二十年專志念佛常以淨業化人得往生者甚衆忽示疾客至問安談論如常時客方出門即遷化人見紫雲向西而沒焉宗利宋宗利居新城碧沼修念佛三昧者十年後入道味山築菴名曰一相越十五年忽謂弟子曰吾見碧蓮華遍滿空中三日復曰佛來矣即書偈云吾年九十頭雪白世上應無百年客一相道人歸去來金臺坐斷乾坤窄奄然而化齊玉宋齊玉號慧覺初于霅川寶藏寺建淨土會後住上竺夜半頂彌陀像行道念佛一日謂首座曰牀前多寶塔現非吾願也所欲則淨土耳可為我集衆念佛首座鳴鐘僧至將百餘玉云今已見佛端坐而逝處謙宋釋處謙精修淨土一夕誦彌陀經畢稱贊淨土告衆曰吾以無生而生淨土如入禪定奄然而化圓照本禪師宋宗本常州無錫人初參天衣懷禪師念佛有省後遷淨慈奉詔入東京慧林寺召對延和殿稱旨平居密修淨業雷峰才法師神遊淨土見一華殊麗問之曰待淨慈本禪師耳又資福曦公至慧林禮足施金而去人詰其故曰吾定中見金蓮華人言以俟本公又蓮華無數云以待受度者或有萎者云是退墮人也有問師傳直指何得蓮境標名答曰雖在宗門亦以淨土兼修耳後臨終安坐而逝諡圓照禪師清照律師宋慧亨住武林延壽寺初依靈芝習律專修淨業六十年每對人必以念佛為勸建寶閣立三聖像最勝殊特有江自任者忽夢寶座從空而下云亨律師當升此座適社友孫居士預啓別亨即在家作印而化師往炷香歸而謂其徒曰孫君已去吾亦行矣乃集衆念佛為說偈曰彌陀口口稱白毫念念想持此不退心決定生安養端坐而化號清照律師晞湛宋晞湛山陰人少為儒生忽厭世出家與瑩行人建無量壽佛殿于阮杜專修淨業坐不背西久之常見佛及二菩薩相一夕面西念佛正坐凝然作印而化藏法師宋僧藏汾州人一生不受道俗禮拜專修淨土將終天樂次第來迎皆不赴及西方佛至別衆而化孤山圓法師宋智圓居西湖孤山廣解諸經刻心淨土造彌陀疏及西資鈔勸發往生將終以陶器合瘞後十五年積雨山頽啓視陶器形質儼然爪髮俱長喻彌陀宋思淨姓喻氏錢塘人自號淨土子早侍瑛法師講法華後專念佛暇則𦘕佛像凡𦘕必于淨室寂想見彌陀光明乃下筆紹興丁巳歲端坐七日一心念佛漠然化去太微宋太微兒時投錢塘法安法師出家初授彌陀經便能背誦及受具扄門念佛精進不怠常縱步後山忽聞笛聲豁然開悟因畜一笛自娛有凌監簿者同志淨業稱微為淨土鄉長一日叩門曰淨土鄉弟相見微曰明當相見于淨土今誦佛正冗耳翌朝人怪其不赴粥往視之見笛鉢禪椅已焚跏趺地上而化久法華宋可久居明州常誦法華願生淨土時號久法華元祐八年年八十一坐化越三日還謂人曰吾見淨土境與經符契蓮華臺上俱標合生者名一金臺標成都府廣教院勳公已生其中一標明州孫十二郎合生其中一標可久一銀臺標明州徐道姑言訖復化去五年徐道姑亡異香滿室十二年孫十二郎亡天樂迎空皆如久所云用欽宋用欽居錢塘七寶院依大智學律聞大智示衆曰生弘毗尼死歸安養出家學道能事斯畢即標心淨土一志不退日課佛三萬嘗神遊淨土見佛大士種種異相謂侍者曰吾明日西行矣即集衆念佛黎明合掌西望跏趺而化善住元善住字雲屋蘇人掩關六時念佛病久不易終時異香滿室有安養傳谷響集行世云妙文元妙文蔚州孫氏子也九歲出家十八受具二十一抵京依大德和尚學圓頓教十有一年始出世縱無礙辨若峽倒川奔及乎閒居簡默言不妄發其涵養冲挹無欲速不躁進大類如此世祖召見顧謂侍臣曰此福德僧也詔居寶集年逾八十專修念佛三昧延祐六年預知時至命諸弟子高稱彌陀佛號面西趺坐手結三昧印泊然而蛻性澄元性澄字湛堂俗姓孫會稽人母姜氏夢日輪從空而墮遂生師四歲常戲筆為佛像授以佛經即能成誦至元丙子投石門殊律師祝髮受具戒習天台教觀至治辛酉驟召入京駕幸文殊閣引見問勞賜無量壽佛等經丞相東平忠獻王請升座說法事聞寵賚尤渥賜號佛海大師晚還越之佛果篤志淨土修一心三觀者七晝夜屢感瑞應一日月旦衆以常儀問訊師遽曰煩點視衣鉢用表無常衆為念佛止曰佛須自念明晨却送別黎明衆集端坐而逝盤谷元盤谷海鹽人狀貌不揚而志氣超邁博覽經史性耽山水至元中歷游五臺峩眉伏牛少室諸名山嘗云足跡半天下詩名滿世間時駙馬高麗瀋王聞師德望聘講華嚴於抗之慧因寺師展四無礙辨七衆傾服王大悅後至松郡搆精舍勤修淨業日課彌陀佛號年七十餘無疾預告以時端坐而寂必才元必才字大用姓屈氏台州臨海人母趙氏嗜善崇佛才娠十月母夢梵僧振錫入堂覺而生師七歲善屬句脫口而就年十二挾冊從江西瞿法師祝髮進具戒凝重沉默觀行精勤孜孜進修無斯須懈接人以慈誨人無倦順帝特賜佛鑑圓照之號一日忽覺頭目岑然即謂衆曰吾緣盡矣乃焚香面西端坐高聲念佛盡一晝夜又告衆曰汝等勿謂修持無驗吾淨土緣熟三昧現前矣即索浴更衣為書以別相識遂合掌而逝茶毗有五色光自龕中發火餘舌根如紅蓮齒牙若珂貝舍利滿地衆取之一時俱盡旨觀主元旨觀主字別宗杭人戒德甚嚴創觀室于龍山之陽修行念佛三昧雖避兵竄逐亦不暫廢臨終無疾沐浴端坐而化祖輝元祖輝住四明郡城佛閣逢人但云阿彌陀佛說亦說不得人因號說不得和尚鄞縣尉王用享夫婦敬事之一日詣其家別云吾明日行矣及明衆集即入龕端坐求甘瓜啖盡一枚念佛而化楚琦明楚琦蜀人篤信西方因抵燕京聞樓鼓聲大徹洪武初三詔說法京都皇情大悅後築室號西齊一意淨業嘗見大蓮華充滿世界彌陀在中衆聖圍繞將示寂書偈示衆曰吾行矣人問何生答曰西方又問西方有佛東方無佛耶乃厲聲一喝泊然而化寶珠明寶珠常遊杭郡嘉禾間冬夏一衲乞食自活宿無恆居平時惟念佛不絶口人喚之才應對即連聲念佛更無雜語後于海門寺忽若癲狂者將半月餘僧呵曰爾平生實行當與世人作眼目何得乃爾珠曰既如是吾行矣索浴畢安然而化慧日明慧日號東溟姓賈氏即宋相賈似道之諸孫似道謫戍時師尚幼志求出家年二十二從柏子庭講台教洞了大義至正間下天竺災元臣高納麟請師新之順帝聞特賜慈光妙應普濟之號至洪武二年召見奉天殿朱顏白眉備奏稱旨太祖顧謂僧衆曰爾等學佛者如金剛楞伽心經皆攝心之要典何不質諸白眉法師自后召見但以白眉呼之五年辭歸上竺日修彌陀懺以臻淨業十二年七月之夕夢青蓮華生方池中芬芳襲人寤告衆曰吾生淨土之祥見矣後四日趺坐合爪而寂世壽八十有九真青明真青湘潭羅氏子生而頴異十五補邑弟子員十九出家參無字話聞舟觸岸聲有省後遷華頂天柱峯修大小彌陀懺密持梵網心地品及十六觀經為常課一夕夢琳宮綺麗寶樹參差見彌陀三聖師方展拜旁有沙彌授與一牌書曰戒香熏修萬曆癸巳正月忽抱疾遂囑弟子曰吾淨土緣熟聖境冥現當于二十九日告終至夕乃起別衆曰吾即逝矣衆請曰和尚往生九品奚居曰中品中生也胡不上品生耶曰吾戒香所熏位止中品言畢泊然而化蓮池大師明蓮池大師字佛慧姓沈氏仁和世族子幼英敏年十七補邑庠試輒冠諸生然志在出世每書生死事大四字于案三十一投西山性天理和尚剃度受具歷諸方遍參知識北游五臺感文殊放光過東昌忽有省作偈曰二十年前事可疑三千里外遇何奇焚香擲戟渾如夢魔佛空爭是與非隆慶辛未乞食梵村見雲棲山水幽寂遂倚壁危坐絶糧七日土人陳如玉等為結茅以棲之村多虎屢苦傷人師諷經施食虎患遂息歲亢旱村民堅請禱雨師擊木魚循田念佛時雨隨注如足所及衆感異之相與肩木荷鋤競闢其地得碣礎曰此伏虎禪師雲棲寺故趾也願為師新之不日成蘭若自是四方學徒日進六時觀念中夜警䇿初師從參究念佛得力遂崇淨土一門著彌陀疏鈔十萬餘言更録古德機緣喫緊語編為禪關䇿進以示參究之訣蓋顯禪淨雙修之義也又精嚴律制為第一行著沙彌要略具戒便蒙梵網經疏發隱等以發明之師道風日播朝野感化慈聖皇太后見師放生文甚嘉嘆遣內侍賫紫袈裟齊資往供問法要師以偈答之將入寂預于六月中旬入城別諸弟子不欲明言近乎揑怪但云吾將他往還山連下堂供衆云此處吾不住將他往矣衆罔測常規設盂蘭盆師曰今歲我不與會矣有簿記師密題云雲棲寺直院僧代蓮池和尚追薦沈氏先宗後閲簿方見始知其預留此別語也七月朔晚入堂囑大衆曰明日要遠行我言衆不聽直待一撞一跌才信我也衆留之師作三可惜十可嘆以警衆次夜入丈室因示微疾瞑目無語衆請城中諸弟子至師開目云大衆老實念佛言訖命移坐向西念佛趺坐而逝先是漏語見大蓮華終亦不能祕其往生之驗云時萬曆乙卯七月四日午時也世壽八十有一師自卜寺在嶺下遂奉全身塔焉世稱蓮宗八祖佛石明佛石別號法雨老人錢塘戴氏子母夢僧以伽黎覆體而生襁褓惡聞腥羶十四投禮淨明禪師剃染十八受戒於蓮池大師歷游講肆習天台教觀甲午謁紫柏禪師於金陵親承授記臨行囑師云良賈深藏還武林即携一傘肩一蒲團入山為深藏計行至十八㵎中林壑幽異師快甚遂縛傘於短松蒲團趺坐抵暮二虎咆哮繞師不去師囑曰此地我若有緣汝須速去言訖虎即點頭拽尾而去于是誅茆壘石搆一小蓬名流緇侶相繼踵至一日掘地得殘斷礎知為古理安寺因重建焉師性孤卓不動世緣晚歲謝客避居峯頂搆一室開一壙曰吾生可棲死可葬崇禎九年七月十五日忽示微疾時值新秋謂弟子曰今日晴朗吾欲遠去弟子曰師方病欲何往師曰汝謂吾病耶扶杖出𥨊室盥沐趺坐集衆囑付後事適有蔡居士至師撫掌笑曰居士證明餘不及待也弟子請留偈師走筆書曰一句彌陀五十年分明掘地討青天而今好個真消息夜半鐘聲到客船書畢顧視左右投筆而逝祖香明祖香江西新喻人于山東龍潭寺精修淨業有居士王傑者築菴延之未幾語傑云某日當歸家衆苦留香云歸安養家耳及期敷座西向坐逝舉龕入山化火自焚具宗大清釋具宗無錫人講天台止觀及念佛三昧誨人不倦順治己亥間示疾約時沐浴但著一履密表隻履歸西之意誦彌陀經畢念阿彌陀佛十聲舉筆書大字云廓落靈虗無往來處擲筆而去趺坐三日顏色不變感不信向者回心奉佛新𠁼大清新𠁼諱大真童身出家武林蓮居菴受紹覺師之法行般舟三昧終時諸弟子夜同夢見滿空天神執持香華唱云迎新𠁼大師生西方也及旦弟子聚而候之師身康念佛相見如常過三日午時忽坐化林谷大清林谷紹興人住羅山之西南破衲麻鞋唯勸人念佛為要至終時見白雲立佛來迎而化土人改其菴曰白雲道樞大清道樞仁和人每講經以天台宗旨為大綱勸人以念佛工夫為前矛平居勇猛念佛不勤世緣順治乙未年夢偕神僧登玉屏峯頂丙申六月微疾二十六日蚤語衆曰吾夜夢神僧來迓豈即昔之登玉屏峯者耶至戌時忽見幡蓋盈空蓮華布地即趺坐合掌朗誦法華經題七遍念彌陀佛號百餘聲安詳而逝顏色不變龕几間馥馥若有異香萬緣大清萬緣俗姓喬長興人為人愚鈍平日詈之弗嗔譽之弗喜專持彌陀佛號數十年康熙二年六月無疾忽自縛草龕有殷任之者素與師善謂曰師既縛龕我往蘇賣茶歸當為置褥師曰承汝盛心恐不及待至九月初一日微疾但飲白水初六日午時自入草龕趺坐而逝先年往生喬忠我即其族也本冲大清杭郡張家寺禪師本冲素專法席開道羣蒙康熙十一年九月示疾旋回首有頃復蘇謂大衆曰我平日缺念佛功夫今去無坐位汝等當助我念佛衆為合掌稱念逾時而逝觀此則知念佛法門超凡入聖利益非常斷斷不可須臾緩矣寶蓮道人特録以垂確證後學切當猛然篤信真實禮誦毋視念佛為等閒王臣往生類烏萇國王烏萇國王萬機之暇雅好佛法嘗謂侍臣曰朕為國王雖享福樂不免無常聞西方淨土可以棲神朕當發願求生彼國于是六時行道念佛每供佛飯僧王及夫人躬自行膳三十年不廢臨崩容色愈悅化佛來迎祥瑞不一宋世子宋魏世子父子三人俱修西方惟妻不修有女十四死七日更生啓母云兒見西方七寶池上父兄三人已有蓮華沒當生彼母獨無是以暫歸相告幸母留意母感女言頓發信心念佛不倦後命終亦生安養云劉遺民參軍晉劉程之彭城人少孤事母以孝聞自負其才不侶流俗初為府參軍即隱去謝安劉裕交薦不就旌其號曰遺民入廬山依遠公共修淨土專坐禪作觀想法方半歲即于定中見佛光照地皆作金色居山十五年又見阿彌陀佛身紫金色玉毫光照垂手下接以臨其室遺民慰幸悲泣自陳曰安得如來為我摩頂以衣覆我佛乃為摩其頂引袈裟以覆之他日又見身入七寶大池蓮華青白相間其水湛湛如無邊岸中有一人項有圓光胸有卍字指池水曰八功德水汝可飲之遺民飲水甘美盈口及寤猶覺異香發于毛孔乃告衆曰吾淨土之緣至矣廬阜諸僧皆來會遺民對佛像焚香再拜祝曰我以釋迦遺教故知有阿彌陀佛此香當先供養釋迦如來次供阿彌陀佛及法華會中佛菩薩衆以至十方佛菩薩衆願令一切有情俱生淨土祝畢與衆話別面西端坐斂手氣絶年五十九時義熙六年也張抗學士晉張抗積善向佛誓課大悲心陀羅尼十萬遍願生西方年六十餘寢疾一心念佛謂家人云西方淨土只在堂屋西間之內阿彌陀佛坐蓮華上翁兒在蓮華池金沙地上禮佛嬉戲言訖良久念佛而逝翁兒乃孫子名方三歲而亡矣馬子雲縣尉唐馬子雲舉孝廉為涇邑尉押租赴京遭風舟溺被繫乃專心念佛五年遇赦入南陵山寺隱居一日謂人曰吾一生精勤念佛今西方業成行且往生安養明日沐浴新衣端坐合掌異香滿戶喜曰佛來迎我言已而逝白居易少傅唐白居易官中大夫太子少傅捨宅為香山寺號香山居士晚歲患風痺出俸錢三萬繪西方極樂世界一部依正莊嚴悉按無量壽經靡不曲盡頂禮發願以偈贊曰極樂世界清淨土無諸惡道及衆苦願如我身老病者同生無量壽佛所又前答李觀察詩云近有人從海上回海山深處見樓臺中有仙童開一室皆言此待樂天來吾學空門不學仙恐君此語是虗傳海山不是吾歸處歸即應歸兜率天此詩乃中年所作樂天一生精究內典勤修上乘一心超脫輪𢌞往生淨土彼時李師稷觀察浙東有一商客在李所治明州同衆下海遭風飄蕩到一大山瑞雲奇花白鶴異樹盡非人間所見山側有人迎問道是何等人來得到此商客具言隨風飄到岸上人道既到此地且繫定了船上岸來見天師同舟人膽小不敢上去只有這個商客跟將上去岸上人領到一所在儼似大寺觀一般商客隨了這人依路而進見一道士鬚眉皆白兩旁侍衛數十人坐大殿上對商客道你本中國人與吾地有緣方得到此此山即塵世所傳蓬萊山也既到此地可要各處看看去麼商客口稱要看道士即命左右引他宮內遊觀玉臺翠樹光彩奪目有數十處院宇多有名號只有一院關鎖得緊在門縫裡窺進去只見滿庭都是奇花堂中設一虛座座中有裀褥階下香烟瀰漫撲鼻商客問道此是何處却如此空鎖著那人答道此乃是白樂天前生所住之院樂天今在中國未來故關閉在此商客胸中原曉得白樂天是白侍郎之號便把這些去處光景一一記著別了那人走下船來隨風使帆不及十日已到越中海岸商客將所看之景備細來稟知李觀察李公盡録其所言書報白公白公看罷笑道我修淨業多年西方是我世界豈復往海外山中去做神仙耶故將此兩首絶句回答李公以示專修禪門捷徑不復更思篷萊仙島識者咸謂白公脫屣烟埃投棄軒冕一種非凡氣骨想來定是謫仙但今生更加精進一心信向西方直當超脫玄門徑往極樂世界所不待言矣附記于此以為白公宿根之證云江公望司諫宋江公望釣臺人官諫議蔬食清修述菩提文念佛方便文以勸道俗有子早亡託夢云大人修道功業已成冥府有金字額題云嚴州府江公望身居言責志慕苦空躬事熏修心無愛染動靜不違佛法語默時契宗風名已脫乎閻浮身必歸于淨土宣和末知廣德軍一旦無疾面西端坐而化葛繁大夫宋葛繁澄江人少登科第官至朝散凡公署私居必營淨室設佛像嘗人室禮誦舍利從空而下平時以淨業普勸道俗多服其化有僧定中神遊淨土見繁在焉後無疾面西端坐而化張迪助教宋張迪錢塘人官助教從圓淨律師受菩薩戒咨問淨業法門篤志修持誓生安養每念佛時揚聲勇猛至失音猶不已一日謂圓淨曰定中見白色頻伽鳥飛舞于前又三年西向端坐念佛而化王仲回司士宋王仲回官光州司士參軍問無為子楊公曰經中教人求生淨土而祖師云心是淨土不必更求如何楊公答曰試自忖量若在佛境則無淨無穢何用求生若未出衆生境安可不至心念佛舍穢土而求生淨土乎司士感悟欣躍而去後二年楊公守丹陽忽夢司士云向蒙指示今已得生特來致謝數日而訃至言司士七日前預知時至與宗黨言別而化正感夢時也李秉中官宋李秉紹興中官也領御藥院初學禪于淨慈輝公有省晚閲龍舒淨土文遂日課佛號與閣長元美殿長林師文等數十人結淨會于傳法寺忽有疾夢阿彌陀佛以金圓光戴其首越七日又見金光滿房乃囑別親屬端坐結印而終胡闉宣義宋胡闉官宣義平日雖信佛乘而未諳淨土年八十四疾革其子迎清照律師乞垂示誨照謂闉曰公知安身立命處否闉曰心淨則佛土淨照曰公自度平昔時中有雜念染污否闉曰既處世間寧無雜念照曰如是則安得心淨土淨闉曰一稱佛名云何能滅八十億劫生死重罪照曰阿彌陀佛以弘誓願塵劫修行威德廣大光明神力不可思議是以一稱其名滅無量罪猶如赫日消于霜雪復何疑哉闉遂省悟即日延僧念佛次日照復至闉曰師來何暮二大士降臨已久照于是率衆厲聲念佛闉乃合掌而逝文彥博潞公宋文潞公諱彥博平生慕道甚力專念阿彌陀佛期生淨土晨香夜坐未嘗少廢每發願曰願我嘗精進勤修一切善願我了心宗廣度諸含識每見一切人則勸以念佛于京師與淨嚴法師集十萬人為淨土會如如居士有頌贊曰知公膽氣大如天願結西方十萬緣不為一身作活計大家齊上渡頭船臨終安然念佛而化馬墟侍郎宋馬墟厥祖忠肅公守杭日慈雲懺主教令念佛舉家宗奉墟至心念佛二十五年崇寧小疾易衣坐逝有氣如青蓋出戶騰空而去家人皆夢墟往生上品鍾離少師宋鍾離瑾提刑浙西日遇慈雲懺主遂篤信淨土後知開封出則盡瘁國事入則不寐念佛年夜促家人起索浴更衣坐逝舉家見瑾乘青蓮仙樂迎引西去閻榮承務宋閻榮池州人二十年持往生呪念佛將終家人夢佛放光迎榮及曉榮西向趺坐忽起行數步立化王衷朝散宋王衷嘉禾人結社西湖不問賢愚貴賤僧俗但願往生者普請入社有勸修文行世後無疾西向坐化鍾離景融大夫宋鍾離景融官朝請大夫常誦觀經念佛不輟掛冠結茅儀真東園側嘗曰不識彌陀彌陀更在西方外識得彌陀彌陀秪在自己家一夕命僧妙應誦普賢行願品炷香敬聽兩手作印而化錢象祖郡守宋錢象祖號止菴守金陵日以淨土真修為念常于鄉州建接待十處皆以淨土極樂等名之創止菴高僧寮為延僧談道之所自左相辭歸益進淨業嘉定四年二月微疾書偈曰菡萏香從佛國來琉璃地上絶纖埃我心清淨超于彼今日遙知一朵開後三日僧有問疾者公曰我不貪生不怖死不生天不為人惟求生淨土耳言訖跏趺而逝後有人夢空中云錢丞相已生西方蓮宮為慈濟菩薩梅汝能縣令宋梅汝能常熟人仕至縣令有志淨業忽夢僧授紙百幅鑿破為二八字以問東靈照師曰二八十六也豈十六觀經之謂乎適一僧以經與之忽不見由是誦經念佛自名為往生以見志因邑中生公造丈六彌陀像乃施錢百萬為之粧飾殿前池中忽湧一雙頭白蓮其華百葉當年冬無疾而終咱定國學諭宋咱定國號省齊為州學諭常念佛讀淨土諸經每月三八集僧俗諷經念佛嘉定四年夢青衣童告曰佛令召君三日當生彼國至日沐浴更衣念佛坐化馮濟川諫議宋馮楫號濟川遂寧人由太學登第初訪道禪林晚年專崇淨業作西方文彌陀懺儀後以給事中出帥瀘南率道俗作繫念會及知邛州于後廳設高座望闕肅拜著僧衣登座謝官吏橫拄杖按膝而化王敏仲侍郎宋王古字敏仲東都人官禮部侍郎慈仁愛物深契禪宗又悟淨土法門之勝著直指淨土決疑集三卷平生精勤念佛數珠未嘗去手行住坐臥悉以西方淨觀為佛事有僧神遊淨土見古與葛繁同在焉往生有明驗矣蘇軾學士宋蘇軾號東坡官翰林學士南遷日𦘕彌陀像一軸行且佩帶人問之答曰此軾生西方公據也母夫人程氏歿以簪珥遺資命工胡錫繪彌陀像以薦往生因獻頌曰佛以大圓覺充滿河沙界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓橐雖有大聖智亦不能分別願我先父母在處為西方所遇皆極樂人人無量壽無性亦無來張無盡丞相宋張商英初以夫人向氏激發留神內典號無盡居士嘗著發願文云思此世界五濁亂心無正觀力無了因力自性惟心不能悟達謹遵釋迦世尊金口之教專念阿彌陀佛求彼世尊願力攝受待報滿時往生極樂如順水乘舟不勞自力而至矣韋文晉觀察宋韋文晉立行孤潔建淨業道場普度含識六月某日忽面西跏趺合掌念佛而化異香內外皆聞賈純仁郡倅宋賈純仁霅川人官郢州倅潛心淨業長齊念佛因微疾西向宴坐而逝頂上白光圓相異香滿室經宿不散吳信叟進士宋吳子才字信叟致仕之後預作一棺夜臥其中令童子擊棺而歌曰吳信叟歸去來三界無安不可住西方淨土有蓮胎及早回頭歸去來自亦從而和之緣熟時無疾而化張掄都憲宋張掄官兩浙都總官期生淨土刻勵念佛闔門長幻靡不從化鑿池栽蓮日率妻子課佛萬遍孝宗皇帝親書蓮社二字賜焉朱綱少府明朱綱京都人業儒中鄉舉三上春官不第乃就職官二府致任專修淨土日課佛三萬十五年無少怠倦臨終坐榻上兩手擎珠念佛不輟異香滿室乃云佛來也連聲稱念而逝戴百戶明戴百戶前衛世襲也與陶百戶共辦事巡撫標下時錢塘江有殺人巨盜號滿江紅者黨勢熾盛官吏不敢捕巡撫潛召二人手給一牌諭曰我有機密事著汝二人去幹如不能辦當携棺來見語畢即退入內衙二人展牌視之乃捕滿江紅也相對無䇿𢬵身入賊巢多方誘致即正典刑滿江紅臨刑痛恨二人誓必索命二人懼棄職持齊誦經念佛多行善事以解此冤結二人雖異地而修然同時回首戴百戶豫別親屬至期坐脫良久又醒謂親屬曰陶兄臨時念差錯走路頭故我來與汝等說知明日我當去次早復坐脫鼻垂玉柱異香滿室不散金光前代子大清金光前正黃旗代子起身戎伍目不識字然見有義之事則必鋭意為之其妻龔氏傳是廬州孝廉之女痛遭離亂皈心西方且粗知書史凡遇梵典晨夕持誦光前為之感動而篤信焉順治癸巳冬奉討不庭相擕入閩道出武林聞具德和尚說法靈隱同往參問親承開示自此潛心念佛愈切愈堅辛丑夏還京駐節錢塘江干金忽示疾龔為延醫光前止之曰我昔與汝親叩靈隱今正欲于此作轉身之活計求和尚一證明耳何以藥為龔大笑曰不意光前亦得到此田地遂徙帳入崇聖菴蓋欲夫死得其所也菴居旬日龔造二棺謂人曰妾與金公偕行矣顧無人為公畢後事耳事畢我當往矣光前聞之即怡然長逝龔乃作書致靈隱求為兩人秉炬併囑飯僧修懺等事至七日畢屏絶飲食晝夜不臥一心念佛女伴多來勸止堅持勿聽又七日晡時視日蚤暮覺身稍倦倚棺而盹少頃醒曰時至矣端然趨寂顏色如生其鋒之勇捷即龐氏女亦不是過圭峰禪師云作有義事是惺悟心作無義事是狂亂心狂亂隨情轉臨終被業牽惺悟不由情臨終能轉業其光前夫婦之謂乎靈隱和尚為光前舉火云人于生死顛危公于生死自在只者自在底便是成佛作祖柄舉世間人瞻之仰之千載之後留于崇聖菴作一段佳話又為龔氏舉火云世被情愛牽連爾唯生死獨斷棄此身如脫敝屣訂歸期如書契券善女子是真精進真法供養亦是靈山會上第一種大行大願蓮池大師曰聞之古德云士大夫英敏過人者多自僧中來然迷而不返者十九不昧宿因者十一其故何也五濁惡世多諸退緣賢者所難免也故戒禪師後身為東坡青禪師後身為曾魯公哲禪師後身耽富貴多憂苦東坡最為親近法門而曾公已不之及彼哲老之後身其迷抑又甚矣古今知識所以勸人捨五濁而求淨土也然則劉遺民而下諸君子所得不既多乎處士往生類張野茂才晉張野居潯陽兼通華梵尤善屬文舉茂才屢徵散騎常侍俱不就入廬山蓮社修淨業義熙十四年與家人別入室端坐而逝闕公則晉闕公則遠公白蓮社中人已亡友人于東京白馬寺為作忌祭忽林木殿宇皆金色空中有聲云我是闕公則所祈往生極樂寶國今已達矣故來相報言訖不見張銓晉張銓野之族子也高逸好學耕鋤間帶經不釋屢徵弗就庾悅以其貧舉為潯陽令笑曰古人以容膝為安屈志就祿奚榮之有乃入廬山依遠公蓮社研窮內典多有悟入宋景平元年無疾西向念佛安坐而卒周續之宋周續之鴈門人十二通五經五緯號十經童子養心閒居公卿交辟皆不就事廬山遠法師預蓮社文帝踐祚召對辨柝帝大悅或問身為處士時踐王庭可乎答曰心馳魏闕者以江湖為桎梏情致兩亡者市朝亦岩穴耳時稱通隱先生後居鍾山專心念佛愈老愈篤一日向空云佛來迎我合掌而逝庾銑梁庾銑新野人武帝召為黃門侍郎不赴六時念佛一夕見道人自稱願公呼銑為上行先生授香而去後四年願復至遂化去空中言上行先生已生安養高浩象梁高浩象東平人杜門靜坐專誦無量壽經嘗在觀中覺自身泛紅蓮于池面初未見佛乃即華上傾心禮佛遙想金容光輝遠映一夕見衆菩薩來迎即時化去宋滿隋宋滿常州人計豆念佛積三十石開皇八年九月飯僧畢坐逝人見天華異香滿乘空西去鄭牧卿唐鄭牧卿滎陽人舉家念佛開元中病篤有勸進魚肉者確乎不許手執香爐願求往生忽異香充蔚奄然而逝舅尚書蘇頲夢寶池蓮開牧卿坐其上張元祥唐張元祥居常念佛不輟一日促家人云西方聖人待我齊畢同往齊事訖焚香跏趺面西而化元子才唐元子才居潤州觀音寺誦彌陀經念佛忽小疾夜聞空中香氣樂音似有人言粗樂已過細樂續來君當行矣念佛而化異香數日不散同寺元子平後亦聞空中音樂即西向坐化李知遙唐李知遙長安人善淨土教五會念佛為衆師範後因疾忽云佛來迎我洗潄更衣索香爐出堂頂禮乃聞空中說偈云報汝李知遙功成果自招引君生淨土將爾上金橋就牀端坐而化衆聞異香汾陽老人唐汾陽老人于法忍山借一空房止宿晝夜念佛貞觀五年命終時大光遍照面西而逝人見乘蓮臺云房翥唐房翥暴死至陰府見閻羅王王曰據案薄君曾勸一老人念佛已生淨土君承此福亦合生淨土翥曰先許金剛經萬卷巡禮五臺未欲往生王曰巡禮誦經固為好事不如早生淨土王知志不可奪放還以此知勸人修者非徒往生又感動幽冥也孫良宋孫良錢塘人隱居閲大藏尤得華嚴之旨依大智律師受菩薩戒日誦佛萬聲二十年不輟忽日命家人請僧念佛以助往生僧集念佛方半餉望空合掌云佛及菩薩已荷降臨退坐而化王闐宋王闐四明人號無功叟凡禪林宗旨天台教門無不洞達著淨土自信録晚年專心念佛西向坐化異香芬郁焚龕時獲舍利如菽者百八粒范儼宋范儼仁和人絶心世務其子不能治家儼不之顧但云我自是寄客耳日誦法華念阿彌陀佛專心不懈忽見普賢菩薩乘六牙白象放金色光報儼云明日卯時當行越一夕佛菩薩來迎就座合掌而逝陸沅道宋陸沅道號省菴居士住明之橫溪晨起焚香趺坐目不他瞬首倡偈曰盥手清晨貝葉開不求諸福不禳災世緣斷處從他斷劫火光中舞一回然後念誦不緩不急聲如貫珠每日法華一遍彌陀萬聲一意西馳年八十五四月六日沐浴整衣而逝洎殮忽聞蓮華馥郁之氣皆不知來處近挹之蓋出自口中也孫忠宋孫十二郎名忠四明人早慕西方于郡城東築菴念佛後因病請僧百人繫念忽仰空合掌手結雙印怡然而化闔城聞天樂異香漸向西沒二子相繼念佛亦坐化沈銓宋沈銓家錢塘同妻施氏專心淨土平時諸善悉用回向後及妻前後命終皆感化佛持錫接引而去唐世良宋唐世良會稽人持戒念佛年老疾病猶不就枕誦彌陀經十萬過謂家人云佛來接我言訖作禮即便坐逝利行人時在道味山夜夢西方異光幡華天樂空中聲云唐世良已歸淨土計公宋計公四明桃源鐵工也年七十兩目喪明里中咱學諭以擘窠圖印施勸人念佛計公初授一圖念滿三十六萬聲念至四圖兩目瞭然如是三載念滿十七圖一日念佛忽氣絶半日復蘇曰佛令分六圖與咱學諭是勸導之首分一圖與李二公是俵圖之人囑其子往謝之言訖沐浴向西而化沈三郎宋沈三郎晚歲回心念佛因病請僧念彌陀經易衣而終縮膝欲起二子局于名教以易龕為難曳其脛直之將入殮忽舉首出衣被矍然而坐舉家大驚二子急前扶衛乃以肘節捶之子曰助父坐脫耳竟坐逝茶毗有白鶴二十九隻飛鳴雲表久之西去陸俊宋陸俊錢塘人少事公門久之棄去以淨土為業每對佛懺悔垂淚交道友相見說淨土因緣才十餘句便悲咽感嘆臨終請圓淨律師開示西方諷觀經至上品淨曰可以行矣俊曰衆聖未齊姑待之少頃忽起就竹牀面西端坐而逝徐六公宋徐六公者嘉興人務農為業夫婦蔬食精勤念佛四十年預作一龕臨終易布衣草履入龕端坐頃之曰佛來迎我即化去黃打鐵宋黃公潭州人本軍伍以打鐵為生每鉗鎚時念佛不輟口一日無疾託鄰人為寫頌云叮叮噹噹久鍊成鋼太平將近我往西方即化去其頌盛傳湖南人多念佛何曇迹元何曇迹年十八持菩薩戒念佛一宵四鼓即起念誦人云太早答云見佛金相幡華來迎遂脫去吳子章元吳子章蘇州人世業醫與兄子才同參雲屋和尚精勤念佛合門奉法至正間無疾合掌稱佛名化去華居士明華居士江干人醇朴無僞與人不欵曲中年屬業諸子獨處一室不涉世事朝暮惟孜孜念佛而已後將卒自知時至更衣正寢手整冠端坐別衆而逝其子先已作棺于是易龕如沙門故事舉龕之日觀者如堵遠近嚮慕焉蓮華太公明蓮華太公者越人一生拙朴惟晝夜念佛不絶命終之後棺上忽生蓮華一枝親里驚嘆因號蓮華太公云顧居士明顧源金陵人自號寶幢居士幼能詩善草書中年一志淨業後微疾集僧俗道友十念阿彌陀佛唱和相續語人云我決定往生矣人問何故曰我見阿彌陀佛身滿虗空世界金色佛以袈裟覆我我身已坐蓮華中時一衆聞蓮華香諸子悲戀不已居士曰汝謂我往何處何處即此處此處若明何處不了乃屏人曰毋多言亂我心空中諸佛迎我三鼓行矣至期怡然含笑而逝郭大林明郭大林湯陰人平生端潔雅素出世為懷遇僧教以念佛遂一心淨土年七十六一日無疾與子別云明午當去至時坐脫糖擔老人明糖擔老人住杭城艮山門內平時賣糖為生口中念佛不絶忽一日挑糖擔出見人便曰汝及早喫我糖我將歸去也更至數相識家約曰煩儞明日來幫我擡棺我要歸去識者訝之且信且疑次早謂其妻曰可備酒食以待來人餉時識者皆至老人引令擡棺到家沐浴更衣拱手語衆曰我當自寢于棺不勞汝等將身坐棺中怡然就寢遂長往矣衆咸驚異劉通志明劉通志京都人精懇念佛年五十二得疾念益切鄰人李白齊先卒通氣絶自旦至午復蘇謂家人曰適見一舟云往淨土乘舟三十六人白齊與焉我亦一數但衣未鮮潔又忘帶念珠命我易衣取珠舟艤相待家人急為易衣珠掛其項須臾而逝唐體如文學明唐廷任浙之蘭溪人號體如居士孝友醇慤出自天性少遊黌校有聲已而覺世無常傾心至道參雲棲受念佛三昧遂力行之凡十三年如一日唯篤志以西方為歸萬曆癸卯值耳順仲冬之旦忽謂諸子曰新春十有一日吾行矣數日前禮誦如平時至期盥潄整衣端坐手結印口稱佛名含笑而逝如入禪定楊嘉褘文學明楊嘉褘字華泰和人世家子也年十三持不殺戒蚤虱無所傷二十三肄業南雍俄疾作以萬曆乙巳仲冬十九日卒卒之先夢遊地獄見地藏大士于冥陽殿覺而放諸生命延僧誦經念佛謂人曰吾將逝矣青蓮華現吾前得非淨土境乎遂晝夜念佛不輟命息燭曰汝輩假燭為明吾不須燭常在光明中耳問何所見曰蓮開四色問見彌陀否曰見彌陀現千丈身問觀音曰身與彌陀等問勢至曰不見也言訖忽躍起拈香連聲語曰彌陀經功德不可說不可說不可說吾已得上品矣寂然而逝郝熙載文學明郝熙載錢塘人法名廣定生平忠信不欺以德行稱于黌校晚歸佛禪誦夙夜匪懈萬曆辛亥春二月得疾每睡覺云吾夢于山中求見佛佛未見見百鳥叢集如是纍日至二十七食時忽舉首視窗外謂其子世翰曰今日別是一乾坤矣顧家人為置銀錢俄而曰吾向恐見官備用今無用此三鼓云有二童子來迎佛坐蓮華臺現吾前吾往矣吉祥而逝戈廣泰明戈以安法名廣泰錢塘人性至孝素積善行而深自韜晦不求人知晚歲精誠奉佛與靈芝僧玄素結春秋二社念佛誦華嚴五經忽謂人曰吾大限將至當為西歸資糧遂自室課誦昕夕不輟預定歸期于臘月二十一日前二夕母子環視悲哽居士笑曰生必有滅奚悲為吾方凝神淨域面覲彌陀若等慎勿以情愛亂我正念諄諄惟囑玄素助念無間雜語至期寂然而逝孫大玗明孫叔子法名大玗自幼警敏端確年十二隨父鏡吾居士奉四十八願彌陀像入雲棲因受五戒歸而斷葷血息交游罷呫嗶矢志念佛誓取金臺而勤苦不惜身命俄而見兩比丘持蓮華以一心淨土印可復見化人誦金剛經一晝夜乃矍然起坐曰彌陀觀音皆來迎我結金剛拳印大呼阿彌陀佛數聲泊然而寂時萬曆辛亥十一月十一日也俞羡陽文學明俞羡陽名汝廉少補仁和弟子員力學有聲萬曆間應試房考欲薦榜首主考稍抑置固爭不得寧待來科遂下第是年三十一歲隨喪父日從高僧游泣血寫經以報親恩因沉心釋典長齊奉佛修淨土教晨昏念佛不輟晚年常拄杖持筐飯賑濟蟲鳥遇僧至典衣齊之天啓癸亥正月朔親友來賀節者即語之曰豫今上元日永別矣初六日寫遺像越二日備棺衾諸斂具至十五日寅時呼兒媳至榻前曰神僧來迎辰初豫去自起沐浴整衣冠畢登榻跏趺而逝時年七十有二後其孫灝于順治辛卯中經魁旋登甲第亦不虗羡陽所學云韓承山大清韓承山平湖縣褚湖涇人也為人誠朴力務農桑積纍家業田園約千餘金居恆惟持齊念佛而已年八十一康熙元年四月之夕忽謂其子曰明日汝可遍請親族來家我欲與之話別子依命請至設席相待對衆言曰我止有七日住世特與汝等作別當盡歡而散至期沐浴更衣端坐子女親屬悉令環坐念佛自亦念佛良久不動近視之已委蛻矣喬忠我大清喬忠我長興西門湖墊渡人鬻竹器為生兩手削竹口中念佛不輟禮拜烏瞻普聞和尚每瞻山結制時亦入禪堂坐七康熙元年三日前預告親朋子女曰我將歸去至十月朔更衣向西正坐念佛來探視者俱令念佛相助對同道師僧曰而今一別當于蓮華池中相會也言訖悠然而逝瞻山和尚豫所久交其徒法慶古帆來棲豫以淨土相質因為豫言其所躬送者以堅豫信豫自五月發願虔修至此才半載耳乃平湖則有韓承山長興則有喬忠我兩人異地同歸一時並見斯亦奇矣固知盡大地是西方盡衆生是佛人自信不及耳普願閲是書者咸生信樂共赴蓮池庶幾仰副阿彌陀佛之弘願云翟夢鯉大清翟夢鯉法名淨震仁和臨江人素行誠朴篤信淨土十念無違兼誦金剛年踰古希精神矍鑠康熙戊申七月下浣忽示微疾至八月十三日緇素親友皆來探視乃謂衆曰感蒙垂顧須念佛助我往生手自輪珠毫無倦意頃云本欲即去無奈錯過明早去罷次日辰刻衆又畢集念佛而逝沈養素大清沈養素法名智恩仁和臨江人專修淨業寒暑靡間年登七十五六涉險如夷時稱佛號誦金剛嘗展法華三十餘部康熙戊申八月偶抱小恙遂自言曰我當追踪翟夢鯉也因與子云九月十五我歸去矣子云十五缺利十六日好高聲曰寧可上前莫使退後至十四日念佛而逝身有異香數日不散此與翟君同里熏修今乃前後接踵去留自主若此蓋亦罕矣普願覽者感發而興起焉戴童子大清童子戴公烈徽州休邑人流寓塘棲鎮水北界生自儒門周齡失母為兒戲時不踰禮法年十二始習舉子業英英露頴十三益聰敏動止類成人然賦質清弱因醫㿀疹致傷胃氣乃就醫吳門寓所有蓮池大師竹窗隨筆數種每取其書反覆細閲若有會心七月初六日午刻忽端坐謂其祖曰助我念佛遂朗稱佛號其祖和之始則聲高漸至聲低終乃無聲尚見唇動頃之唇亦不動兀然而化時康熙癸丑歲也此童殆宿具善根臨終顯現正念惺然得未曾有四十八願有云十方世界衆生至心信樂欲生我國十聲念我名號而不生者我不作佛彌陀經云是人終時心不顛倒即得往生極樂國土信斯言也此童其流亞歟故特録之以垂不朽豫自六十初度方始發願虔修室人卓濟永步趨豫功才五年餘臨終便爾灑然復託夢生天業已附載卷終用勸衆信矣茲康熙八年歲次己酉元旦豫佛前燈燭四支俱結異常巨華其三華宛如蓮臺最後一華忽現佛像一尊依山趺坐面目儼然衣褶分明適有親族來賀歲者悉令瞻禮皆嘆希有此固佛祖顯靈以堅豫信豫自是益加精進謹告諸方善信切宜懋勉慎毋忽諸寶蓮道人特記尼衆往生類尼大明隋尼大明每入室禮念先著淨衣口含沉香文帝后甚重之將終之日衆忽聞沉香滿室俄而光明如雲隱隱向西沒焉尼淨真唐尼淨真居長安積善寺衲衣乞食誦金剛經十萬遍篤志念佛語弟子曰五月內十度見佛兩度見寶蓮華上童子游戲吾已得上品生言訖跏趺而化祥光滿菴尼悟性唐尼悟性居廬山念佛虔願往生忽聞空中音樂謂左右曰我已得中品生見同志念佛精進者皆有蓮華待之汝等好自努力言訖而逝尼能奉宋尼能奉錢塘人專修淨業嘗夢佛光照身及聞空中善言開慰告其徒曰吾往生時至少頃聞奉念佛聲甚厲奔往視之則合掌面西坐逝矣異香滿室樂音西邁尼法藏宋尼法藏居金陵勤志念佛夜見佛菩薩來光明照寺奄然而化尼無為明蕭山來氏女幼誓不嫁蔬食念佛年二十剃髮結茆專修淨業三十游方參學凡所歷處有病苦者隨物取與煎湯服之即愈嘉靖間宮中時疫風聞于朝召赴有驗賜無為心禪師之號送歸故廬將終日有神僧投宿無為却之再三神僧勸誡而進權宿禪牀睡醒不見知是神僧便起坐偈云六十四年活計今朝撒手歸西得個菩提三昧依然明月清風即逝茶毗一團舍利塔于冠山尼月朗大清尼月朗松江世族吳氏女父母欲為擇配力阻弗擇年十七遇杭州尼千江化緣齊僧懇求出家次年春隨祖母諸眷屬天竺進香乘便竟至千江庵住足示無歸意眷屬咸往勸之歸決志不𠃔衆知不可婦女往生類文帝后隋文帝后獨孤氏雖處王宮深厭女質常念阿彌陀佛以八月甲子命終時永安宮北種種音樂自然震響異香滿室從空而至帝問闍提斯那是何祥瑞對曰淨土有佛號阿彌陀皇后業高超登彼國故現此瑞耳姚婆唐姚婆上黨人因范行婆勸念阿彌陀佛臨終見佛菩薩來迎告佛言未與范行婆相別請佛暫住少時佛住空中候范婆至姚婆立化溫靜文妻唐溫靜文妻并州人久患在牀靜文勸以念佛一年不絶遂見淨土乃告靜文言我已見佛後月定去又以食獻父母云今得隨佛往生願父母及夫專心念佛來西方相見言訖而終前三日見蓮華大如車輪荊王夫人宋元祐間荊王夫人王氏與婢妾精修淨業唯一妾懈怠夫人斥之妾悔悟精進久之謂他妾云吾今夜當生西方是夜異香滿室無疾而終明日他妾告夫人昨夢化去者託致起居云𫎇夫人訓誨已獲往生感德無量夫人云使我亦夢乃可信耳其夜夫人夢見亡妾敘謝如前夫人云西方可到否妾云可到但從妾行夫人隨之見池塘廣大紅白蓮華大小相間或榮或悴種種不同夫人問云何以如此妾云此皆世間發念修西方人也才發一念池內便生蓮華一朵若願心精進則華日日敷榮以至大如車輪若願心退轉則華日日萎悴以至殞滅次見一人坐蓮華上天衣飄揚寶冠瓔珞莊嚴其身夫人問云何人也妾云楊傑也又見一人朝服坐于華上妾云此馬玗也夫人云我當生何處妾引行數里遙望見一金壇金碧照耀妾云此夫人化生處乃上品上生也夫人既覺訪問楊馬所在則傑已亡而玗無恙是知精進不退者雖身在娑婆之內其神識已在淨土矣後夫人于生日秉爐焚香望觀音閣而立子孫方具獻壽之儀已立化矣馮氏夫人宋廣平郡夫人馮氏名法信贈少師許珣之女適承宣使陳思恭少多疾往見慈受深禪師教以持齊念佛精修淨業夫人盡去葷血衣掃塔服專以西方為念行亦西方也坐亦西方也起居食息亦西方也語默動靜亦西方也酌水獻華亦西方也誦經行道亦西方也剎那之念秋毫之善一以為西方之津梁十年間無惰容心安體健一日忽書偈云隨緣任業許多年枉作老牛為耕田打疊身心早歸去免教鼻孔受人穿族黨怪之夫人云支那緣盡行即西歸何怪之有乃臥疾忽矍然而起云吾神游淨土面禮阿彌陀佛觀音左顧勢至右盻百千萬億清淨佛子稽首慶我來生其國若宮殿林沼光明神麗與華嚴十六觀經所說同明日安然化去家人聞妙香芬馥三日茶毗舉尸如生觀音縣君宋吳氏縣君其夫都官員外郎呂宏亦悟佛理夫婦各齊戒清修吳氏有二侍女亦絶葷血勤力助為勝業其一頗好禪理既病猶怡然笑語而逝如委蛻然其一奉戒克苦或終月不食但日飲吳氏所呪觀音淨水一盞而已忽見金蓮捧足者三又數日見其膝又數日見其身又數日見其面目其中乃阿彌陀佛左右則觀音勢至也又悉見其堂殿國界皎如指掌曉然知其為淨土問其詳則云彼皆清淨男子經行遊樂無女人也又問彼佛如何說法云我得天眼未得天耳故但見問答指顧而不能聞所說也如是者三年未嘗一日不在目前忽感疾自言往生乃終吳氏事觀音有靈感每于淨室列置瓶缶數十以水注滿手持楊柳誦呪必見觀音放光入瓶缶中病苦者飲水輒愈所呪水積歲不壞大寒不凍世號觀音縣君陸氏宜人宋宜人陸氏錢塘人朝請王璵妻也嘗誦法華篤意淨土禮懺一會念佛萬聲凡三十年因微疾忽聞天鼓自鳴人方驚異即面西端坐雙手結印而逝胡長婆宋胡長婆李氏上虞人夫喪後日夜高聲念佛及誦彌陀經凡十餘年一日見有僧覆以緋蓋曰汝十五日子時往生問師何人曰是汝所念者婆遂會別諸親至期有異香光明端坐而逝七日焚化齒如白玉舌如紅蓮睛如葡萄皆精堅不壞舍利不可數計次日焚處生一華如白粟云龔氏宋錢塘龔氏晝夜念佛誦彌陀經後有疾請亨律師指示陳說未終端坐而化老妾于氏亦念佛不輟一夕夢龔氏告云我已生淨土汝七日當生至期亦逝鄭氏宋鄭氏錢塘人日課觀音經念佛不輟後病中索浴浴畢西向坐問家人云聞磬聲乎淨土諸聖且至已而合掌喜躍曰佛菩薩來觀音手執金臺如來接我登座遂奄然而化黃氏宋黃氏四明人早喪夫因歸父舍精修淨業臨終見佛來迎結印徐行儼然立化家人篩灰于地以驗生處見蓮華一朵生灰中朱氏宋霅川朱氏念佛三十年忽斷食四十日唯飲水念佛夢三僧各執蓮華謂曰吾先為汝種此華今當往生既寤請僧助念端坐而逝項氏宋項氏名妙智鄞縣人寡居二女悉令為尼精勤念佛一日忽曰我欲坐脫錯與作棺女曰佛用金棺無嫌也母喜俄而異香滿室西向結印微笑而逝裴氏女宋汾陽裴氏女專志念佛報盡日索火焚香言佛以蓮臺迎我我當往生已而天華飛墜安坐而化沈氏宋沈氏慈溪人自幼蔬食念佛歸章氏一心不變施米貸被以濟饑凍後微疾念佛尤力忽見佛菩薩諸天聖衆普現目前燈光千點纍纍然狀若虹橋即日吉祥而逝樓氏宋樓氏慧靜適寺簿周元卿嘗披玩傳燈發明見地尤以淨業為真修念佛不輟晚年被疾忽見蓮臺紫色化佛無數異香滿室語家人亟令念佛頃刻而化周氏宋周氏妙聰周元卿之女也因感其母華臺往生之瑞篤志念佛期生安養病中請僧行懺自見其身著新淨衣在樓閣上作禮念佛謂家人曰勤修淨業西方相待右脅西向而逝秦氏宋秦氏淨堅家松江厭惡女身與夫各處精持齊戒閲華嚴法華光明般若經無虗日晨昏修彌陀懺禮佛千拜久之有光明入室面西安坐而終鍾婆宋嘉禾鍾婆誦彌陀經念佛二十年為常課一日語子曰見大白蓮華無數衆聖在此端坐聳身而化孫氏宋錢塘孫氏女常念佛持呪因病請清照律師至謂曰久病厭世願求往生師為談淨土因緣大喜至夜夢師持藥一盞服之流汗身心輕安三日後語侍人曰迦葉尊者來此好金蓮華座即瞑目結印而化梁氏宋梁氏女居汾陽兩目俱盲遇沙門勸令念佛越三年雙目開明後忽見佛菩薩幡蓋來迎即日命終黃婆宋潮山黃婆持金剛法華專心念佛忽患痢疾但飲水不食鄰菴僧善修夢婆來謂曰將往西方越二日婆西向念佛端坐而化遠近皆見紅霞覆婆之屋崔婆宋東平梁氏乳媼崔婆淄州人平生茹素極愚不能與同輩爭長短主母朝夫人留意禪學崔朝夕在旁但誦阿彌陀佛䖍誠不少輟不持素珠莫知其幾千萬遍年七十二得疾不下床然持念愈篤忽若無事時倡偈曰西方一路好修行上無條嶺下無坑去時不用著鞋襪腳踏蓮華步步生諷咏不絶口人問何人語曰我所作曰婆婆何時可行曰申時去果以其時去用僧法焚之舌獨不化如蓮華然鄭氏元鄭氏淨安錢塘人念佛日無虗度得疾聞空中聲曰汝行有期母得自怠又見佛身金色即奮起面西端坐召其出家子義修諷彌陀經倐然而化其女夢母報曰吾已得生淨土可聞之諸修師云周婆元鄞縣寶幢市周婆精修淨土遇歲首持不語晝夜常坐盡月而止遇暑月則施茶湯歷久不廢一夕夢大荷葉遍覆一市覺自身持數珠行道葉上既而微疾鄰人夜見幢幡寶蓋來入其家黎明婆已合掌念佛逝矣薛氏明薛氏武塘世族女也生時母夢長庚入懷後歸周生子五人而寡秉節目誓供觀音大士香煙結蓮華人異之專心淨業好施不倦念佛十五年如一日萬曆丁亥五月得疾醫進乳粥確乎不許逐絶粒屏藥石至九月六日延僧禮懺且曰四日足吾事畢矣乃西向對彌陀像晝夜繫念囑諸子翊贊禁諸婦女母入是日索水灌手誦甘露真言著淨衣戴志公帽長跪佛前念然香讚佛偈唱三皈依禮三拜輪珠念佛一百八遍逮午趺坐結印而化神氣熙然較生存倍更開朗一時在側者俱聞蓮華香滿室中諸子奉命入龕觀者數千人歡喜頂禮云于媼明于媼北京昌平州邵村民于貴之母久積念佛一日浣衣甚潔謂其子曰豫將生淨土子未信至期取几置庭心坐几上脫去異香天樂鄉人皆聞張母明張母陶氏為長水守約居士繼室居士奉佛母化之日課誦無間居士出禮普陀母謂二子曰吾平日參是心作佛是心是佛二語今始悟初四日吾行矣及期端坐而逝次日居士歸成殮俄而棺上出青蓮華五朵居士大駭異自愧恆常與俱不知其道行如此遠近見聞靡不嘆慕孫氏母明中官孫名之母一生齊戒念佛年老微恙自知時至告其子欲坐脫子哀泣止之不得乃為作龕至期入龕安坐化去徐氏明陸母徐氏嘉定人孀居刻志淨業夫昔有千金出貸焚券不取奩飾罄以施人恆于佛所禮誦不輟如是者十載一夕忽呼侍人曰看東方光發否我往生時至矣汝輩可助我遂高聲念佛合掌而逝朱氏明陳母朱氏吳郡嘉定人濬川居士室也孝慈天植素向三寶年八十一其子參雲棲歸導以念佛往生遂篤志淨業越二載示疾卒之前三日堂前大呼母名者三母云有二青衣在此時病久孱困忽躍起竪脊端坐諸子勸其寢息乃吉祥而逝迎尸中堂仰臥之尸自轉西向一時駭異以為精誠所感致云徐氏大清餘姚徐氏司馬執䇿徐公姑也適烏山胡振嶽資産饒裕舉四子一女年四十餘夫喪遂託委家事深居閫內未嘗一入寺廟亦不持長齊惟每日晨興盥潄焚香至心禮念阿彌陀佛千聲如是者二十餘載一日無疾忽謂家人曰有金童玉女多人執綵旗寶蓋在此迎接越三日當與偕行屆期黃昏時呼家人永訣云頃即去矣長幼環集並無他誡但囑云人當念佛正身端坐而逝太君江孺人大清杭郡太君孺人江氏餘杭儒宗訒公嚴先生繼配都諫灝亭公沆之生母也太君産於望族賦質賢淑秉性仁慈年十五適訒公孝以承先慈以逮下積德裕後勤儉治家凡五十餘年初訒公皈依蓮池大師篤信淨土太君方青年即奉教虔修每雞鳴輒起長跪佛前誦經持呪念佛千聲諸爇香炳燭盥飲之役悉不呼睡婢或勸之母自苦曰習勤固我素況自了身後事乃以纍若輩豈學道人所宜康熙戊申二月示微疾數日旋差至三月六日晨起課誦一如平時達旦仍𥨊疾進藥弗飲曰我無他病苦但覺肢體憊甚當不復起安睡移時忽大聲曰觀音菩薩來矣趣具湯淨體巾拭畢甫就枕又毅然欲起坐子婦恐過勞力止之復臥片刻瞑目而逝殮時顏色紅潤異常手足綿軟心頂猶熱此足驗太君善根夙植德盛功深致感菩薩親來接引臨終正念惺然其往生安養永享無窮之樂壽所必然矣至如子孫振振甲第聯翩躬膺榮寵食報於塵世者特其緒餘耳傅氏大清塘棲鎮西小河沈易生室傅氏法名德蓮素敦信向持齊念佛沈以瞽目賣卜所得餘資悉以飯僧四方瓢衲聞風雲集接踵而至傅氏不憚勤勞䖍誠齊供者十有六載康熙壬子七月忽示疾伏枕旬餘至閏七月初一子時索湯沐浴更衣謂親屬曰我有金童王女來相接引因命扶起前行數步端坐椅上合掌念佛瞑目而逝瞻山法慶和尚為說偈曰老婆弘願自剛強典座行堂一力當大道本無男女相真心不落斷常光生前夙植華開日展臂高超往上方豈讓靈昭能撒手蓮生火內更馨香此係豫比鄰衆所共知多年禪宿回首灑然不過如是在俗女流臨終之際動止恬適自然而然豈易得哉直令人敬羡不置寶蓮道人特記補遺鍾氏明鍾氏仁和張後溪繼室年四十夫喪遂持長齊篤信念佛者四十餘載居常每聞天樂鳴空又夜常聞戶外佛聲浩浩啓視杳無人跡如是異徵屢屢槩見泰昌元年臘月十六日臥病二十四日絶食止飲白湯數日至次年元旦為家人言見遍室蓮華并有幡蓋懸于床前口中念佛不輟戌時吉祥而逝惡人往生類張善和唐張善和殺牛為業臨終見羣牛作人言索命善和大恐告妻云急請僧為我懺悔僧至諭之曰十六觀經說若人臨終地獄相現至心十稱南謨阿彌陀佛即得往生淨土善和云便入地獄也不暇取香爐即以左手擎火右手拈香面西專切念佛未滿十聲乃云我見阿彌陀佛從西來與我寶坐言訖而逝張鍾馗唐張鍾馗殺雞為業病革見一緋衣人驅羣雞來呌云四畔上血流被面受大痛苦有僧為鋪像燒香念阿彌陀佛兼令鍾馗一心專念頃之香氣滿室恬然而逝雄俊唐雄俊寓成都膽勇過人不守戒律嘗罷道從戎尋復為僧因聞經言一稱佛名滅八十億劫生死重罪乃大喜曰賴有此耳自是雖為惡而念佛不輟丁未二月暴亡經宿忽蘇言至冥司主者曰誤追汝然汝念佛本無深信今還人世宜倍精進人以為地獄漏網既而入山齊戒念佛越四年辛亥三月緇輩咸集告曰吾時至矣爾輩還城見吾親知為吾語曰俊以念佛得生淨土母以為地獄漏網人也語笑之間端坐而化惟恭唐惟恭住法性寺慢上凌下親狎非類酒徒博侶交集于門暇則念佛寺僧靈巋者同惡相濟里人為之語曰靈巋造惡惟恭繼跡地獄千重莫厭雙入恭聞曰我雖積業罪無所逃然賴淨土教主憫我愆尤我塗炭豈復墮惡道耶乾寧二年病革巋自外還見伶人數輩少年麗服問所從來答曰西來迎恭上人耳一人懷中出金瓶瓶中蓮華其合如拳俄頃增長如盤盂光彩交映望寺疾馳而忽不見巋至寺聞鐘聲恭已逝矣瑩珂宋瑩珂受業霅川瑤山酒炙無所擇忽自念梵行虧缺恐從流轉令同住取戒珠禪師所編往生傳讀之凡讀一傳為一首肯既而室中面西設禪椅絶食念佛越三日夢佛告曰汝尚壽十年且當自勉珂白佛言設有百年閻浮濁惡易失正命所願早生安養奉事衆聖佛言汝志如是後三日當迎汝至期命衆誦彌陀經乃曰佛及大衆俱至寂然而化仲明宋仲明居山陰報恩寺素無戒檢因感疾謂同學道寧曰我今心識散亂何藥可治寧教以隨息念佛明如所教至七日力已困憊寧又令想目前佛像久之忽見二菩薩次復見佛瞑目而逝吳瓊宋吳瓊臨安人先為僧退道返俗前後兩娶生二子屠沽之事靡所不為常庖厨殺雞鴨等則持而唱云阿彌陀佛子好脫此身去連稱佛號乃施刃每切肉念佛不輟後目上生瘤如雞卵遂大憂怖搆草菴分散其妻子念佛禮懺晝夜如不及紹興二十三年告人云瓊來日戌時去也人皆笑之次晚以布衫換酒飲畢書頌云似酒皆空問甚禪宗今日珍重明月清風端坐合掌念佛呌云佛來即化去金大公宋金會稽人網魚為業忽猛省持戒精進日課佛號萬聲久而弗替後無疾語家人云阿彌陀佛與二菩薩俱來迎我我歸淨土去也焚香端坐而化邑人聞異香天樂終日不散馮珉宋上虞民馮珉少事游獵見巨蛇持矟將往刺之時蛇在巖下欲噬黃犢珉推巖壓之至死蛇屢為祟珉修懺念佛經年蛇不能害一日請同社淨侶誦彌陀經合掌而化畜生往生類龍子菩薩處胎經云有一龍子謂金翅鳥曰我自受龍身未曾殺生觸嬈氷性壽終之後當生阿彌陀佛國鸚鵡唐貞元中河東裴氏畜鸚鵡常念佛過午不食臨終十念氣絶火化之得舍利十餘粒炯然耀目僧慧觀者用陶甓建塔以旌其異成都尹韋臯為之記有了空相于無念留真骨于已斃之句云鴝鵒宋黃巖正等寺觀公畜鴝鵒能言常念佛不輟一日立化穴土葬之俄而舌端出紫蓮華一朵靈芝律師嘗為之讚有立亡籠閉渾閒事化紫蓮華也太奇之句焉又潭州人養一鸜鵒俗名八哥兒見僧念佛亦學念佛遂捨與僧此僧常教念阿彌陀佛後斃僧為小棺埋之冢上生蓮華一朵開棺看其根自口中生人為偈云有一飛禽號八哥解隨僧口念彌陀死埋平地蓮華發人不回心怎奈何蓋阿彌陀佛有誓願云衆生念我名號者必生我國凡言衆生者上自天人下至微細蟲蟻之類皆是以此觀之則此八哥兒必生極樂世界為上善人矣人而不知人而不修可痛惜哉事在潭州城外因此而名其城門靈犬大清杭郡橫河橋東街普慈寺僧天一畜一犬每遇蓮社衆信齊集誦經念佛犬即蹲伏而靜聽者有年矣康熙五年六月六日俗例猫犬同俗狥例浴此犬于池次早死于圊側僧衆憐之為說三皈依持呪焚埋犬忽起立聽法音竟復合前爪而仆如合掌然一衆驚嘆犬既現此神異則知平日蹲伏時必竭誠信向口雖不能言而心自默念其往生安養作上善人無疑矣犬尚有此顯應奇跡人之䖍修淨土者更當何如耶天一為之誦曰荒荒古苑半蘼蕪幸有靈尨義未辜踏遍苔蘚迎善客吠殘蘿月警頑夫遺骸自把真心顯公案誰參佛性無多載盡誠緣忽謝茶毗莫異海山狐特録之以與鸚鵡鴝鵒並垂不杇然二禽猶能出口犬則惟是默持實亘古希有之異云念佛現應龍舒云極樂國土雖去此百萬世界論其迹則不勝其遠然佛之慧性含虗空世界故無所不在是以一切衆生舉意動步皆在佛之性中至心懇切無不應驗謹將傳記所載耳目所經現世感應者録之請佛形儀天竺雞頭摩寺五通菩薩以神力往安樂國見阿彌陀佛陳云娑婆衆生願生淨土無佛儀形請垂降許佛言汝應先行尋當現彼五通還聖儀已至一佛五十菩薩各坐蓮華在樹葉上遂傳寫流布勝會書名長蘆宗賾禪師遵遠祖遺範建蓮華勝會普勸念佛一夕夢一人烏巾白衣丰貌清美揖而曰欲入公蓮華勝會乞書一名賾問何名答曰普慧書已又云家兄普賢亦乞併書賾覺而檢華嚴離世間品有二菩薩名因思佛子助佛揚化必有聖賢為之幽贊然則與此會者豈小緣哉遂以二菩薩為會首云法門最勝唐慧日泛泊渡海達天竺參訪知識咨稟捷徑要法天竺學者皆讚淨土至健䭾羅國東北大山有觀音像日乃七日叩頭又斷食畢命為期至第七日夜忽見觀音現紫金身坐寶蓮華垂手摩日頂曰汝欲傳法自利利他惟念西方極樂世界阿彌陀佛當知淨土一門勝過諸行說已忽滅日回長安普勸念佛夫婦見佛宋葛濟之句容人稚川後也世事仙學妻紀氏獨精誠念佛元嘉十三年方在機杼忽覺空中清明因投杼仰瞻四表見西方有佛現身寶蓋幢幡映蔽雲漢喜曰經言無量壽佛其即此耶面佛作禮濟之驚異就之紀氏指示佛所濟之亦見半身俄而隱沒祥雲五彩親里咸睹焉自是多歸佛法鬼不敢噉佛世有一國鄰于羅剎雖剎食人無度王約自今國中家以一人次第送與弗得枉殺有奉佛家止生一子次當充行父母哀號囑令至心念佛以佛威力鬼不得近明晨往視見子尚在將之而還羅剎之患由此遂息念佛却鬼望江陳企嘗妄殺人後見鬼現企畏懼急念阿彌陀佛鬼不敢近企念佛不已鬼遂不現後常念佛臨終坐化後半年附本家孫女妙光云我因念阿彌陀佛已生極樂世器舉動言語一如平生親戚相知皆來看至兩三日家人云惜乎你在生時不曾傳得喜神供養企遂現儼然如平生唯面帶少顏蓋西方長生不老其頭如佛之螺髻蓋成佛之漸也念佛聰辨隋南嶽慧思禪師精心事佛因夢阿彌陀佛與之說法自是聰慧過人辨才無礙念佛薦亡宋鎮江張繼祖篤信西方其乳母死多為念阿彌陀佛追薦一夜夢母來謝云荷君念佛已生善趣念佛眼明宋懷寧縣營田莊有阮念三嫂患兩目將盲常念阿彌陀佛遂得開明閻王勸婆宋鎮江金壇縣株林村蔣婆年七十許死至陰府命未盡當還閻羅王問云汝能念經否對曰不能王云汝不能念經當念阿彌陀佛既放還蔣婆謂閻羅王教我念佛更無可疑故常念佛近百二十歲方終其生淨土斷可必矣睡寢得安宋劉仲慧湖州長興人患夜夢恐怖有教以念佛者遂至誠高念一百八遍然後就寢當夜神魂晏然自是繼念不輟念佛脫難宋晉江邵彪字希文為士人時夢至一官府人皆稱安撫彪自喜曰豈非豫及第後作安撫乎行至前見一官問曰汝知汝未及第因否對云不知令引彪去見一大鑊煮蛉蜊見彪乃作人聲呌彪姓名彪遂念阿彌陀佛方念一聲蛉蜊皆變黃飛去彪後果及第至安撫使以此見殺生阻人前程不可不戒又見佛力廣大不可不敬官職自有定分而人不可以苟求者也念佛止疾宋王龍舒附舟至鎮江閘中闕水不能行乃于金山借四經即阿彌陀經也欲校勘刊板廣傳舉筆之時右手有風其指自掉寫字不便乃舉指念阿彌陀佛與觀世音菩薩數聲禱告乞除風疾以成就寫此經禱畢指遂不掉以至終帙無恙以此見佛與菩薩只在目前但人信心不至耳龍舒自記念佛免死有一老婦雙瞽令小兒牽行常念阿彌陀佛一日息于舊屋之下屋忽傾倒小兒走去老婦在下乃有二木相拄護于老婦之上得不壓死念佛辟瘧宋李子清久瘧不愈龍舒居士授之一方教以臨發之際專志念佛然後服藥子清信而行之當日減半次日復念遂全愈自是篤信念佛舍利迸現宋贑州廉中大夫恭人繡丈六身阿彌陀佛方及半忽有舍利現綵縷中舉宅驚嘆又真州鍾離少師任氏夫人修西方雕阿彌陀佛像長四寸八分龕飾甚嚴常頂戴行道其像眉間忽迸出舍利大如黍米光彩照人治病得愈宋秀州一僧常念阿彌陀佛為人治病有病者請往常得痊愈州人敬信如佛兒孫免難宋鎮江村落間有一老人每有事必合掌至額念阿彌陀佛其孫方二三歲因隨母至田野忽失之老人尋訪不見後數日人告云在溪外果尋得之見足跡遍于灘上其溪甚深不知此兒何緣過彼又久而無恙人以為其祖至誠念佛所感也念佛脫械元至正十五年張士誠攻湖州江浙丞相與戰擒四十人囚檻送戮夜宿西湖鳥窠寺適大猷謀禪師徐步廊下囚因求救師教至心念南無救苦救難阿彌陀佛中有三人信受其語念不絶口天曉發囚易枷鎖至三人刑具不足惟繫以繩既而審鞫知良民被虜者遂得釋念佛鬼敬明海昌村民某有老媼死附家人言平生事及陰府報應甚悉鄉人環而聽之有一人在衆中忽攝心念佛媼謂曰汝常如此何患不成佛道問何故曰汝心念阿彌陀佛故問何以知之曰見汝身有光明故村民不識一字瞥爾一念尚使鬼敬況久修習者乎是故念佛功德不可思議女轉男身大清杭郡府治前管米山皂隸王三官之母孀居年老日唯念佛所積十餘金悉向靈隱施捨康熙元年五月寢疾亡去半日復蘇曰我去投一男胎因彼處才請收生婆時辰未到故我轉來與你們說更憩半餉而沒念佛生天大清仁和塘棲鎮卓孺人法名濟永乃左春坊卓朗之姊而為豫元配也生平性直心慈篤信佛法尊禮玉林具德兩大師間亦施捨僧尼遇貧苦疾痛者必矜恤之辛丑歲豫六十初度得王龍舒淨土文心切向往遂專修淨業卓亦依法修習日課念佛誦彌陀經已五六年矣今康熙丁未閏四月初二日辰刻忽示微疾初三日戌時忽自坐起瞑目安然而逝及殮時顏色如生歡容可挹衆咸嘉嘆逆知其必歸善地矣至五七之夜託夢與兒媳陳氏云前者有天神執長柄香爐迎我故我即去因問云曾知死否答云初猶朧不知今已知矣我今不喜著艷服直入臥內開箱換一豆菉色衣一月白色衣灑然而去蚤起媳詳述其夢豫檢視箱中果有此二色衣焉又是夜老婢桂香亦夢孺人層臺端拱高坐前廳所帶俱冠纓珠絡若諸天狀又復現此一相則其生天無疑矣謹據實具録一字無虗用告衆信萬萬及蚤念佛發願往生臨命終時自有妙境現前決然不爽此其明驗也寶蓮道人特識以堅己信并以勵法界之共信者佛示念佛十種功德若人受持一佛名號者見世當獲十種功德利益一晝夜常得諸天大力神將并諸眷屬隱形守護二常得二十五大菩薩如觀世音等及一切菩薩常隨守護三常為諸佛晝夜護念阿彌陀佛常放光明攝受此人四一切惡鬼若夜叉羅剎皆不能害一切毒蛇毒龍毒藥悉不能害五一切火難水難冤賊刀箭牢獄枷杻橫死枉死悉皆不受六先所作罪皆悉消滅所殺冤命彼蒙解脫更無質對七夜夢正直或復夢見阿彌陀佛勝妙色身八心常歡喜顏色光澤氣力充盛所作吉利九常為一切世間人民恭敬供養禮拜猶如敬佛十命終之時心無怖畏正念現前得見阿彌陀佛并諸菩薩聖衆手持金臺接引往生西方淨土盡未來際受勝妙樂歷代尊宿廬山遠祖師悟摩訶般若深旨號東方護法菩薩而六時念佛三覩聖像往生淨土天台智者大師妙悟法華一家教觀萬代宗祖而生則面西辨十種疑疏十六觀極談淨土百丈大師馬祖傳道嫡子天下叢林共宗而祈禱病僧化送亡僧悉歸淨土永明壽禪師得無礙辨才柱石宗門偏贊西方上上品生敬及冥府死心新禪師繼席黃龍宗風大振而切意淨業著勸念佛文令人發哀起信真歇了禪師嗣丹霞淳公洞下一宗至師大顯而卓庵補陀專意西方有淨土集行世慈受深禪師得法于長蘆信公專心念佛而謂修行捷徑無越淨建西方道場苦口勸衆圓照本禪師道續天衣宗弘雪竇法雷震地師表兩朝而淨業兼修標名上品石芝曉法師嗣月堂洵公洞徹教部以淨業化人嘗集大藏諸書有樂文類行世寂堂元禪師學禪于密庵傑公篤行念佛三昧感金甲神自天而降夢紅蓮華從地而出由是十洲蓮宗大行中峯本禪師得法高峯妙公學者仰如山斗而云禪者淨土之禪淨土者禪之淨土有懷淨土詩百首勸人念佛優曇宗主居廬山東林善法堂著蓮宗寶鑑奉旨板行為淨土中興王以寧侍制自稱彌陀弟子朝悅之翰林答趙子昂書稱西方淨土是真語實語陳瓘侍制作延慶寺淨土院記極贊念佛以上略舉諸大尊宿其餘尊宿修淨土者不可勝紀蓮池大師曰自遠祖至優曇歷代尊宿無不崇奉淨土下士大夫安可不斷疑決志勇猛鋭進哉
