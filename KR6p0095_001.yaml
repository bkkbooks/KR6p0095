body:
  text: 宋國學進士王龍舒先生著後學俞行敏惠公甫重輯淨土原始經言西方淨土以七寶莊嚴常清淨自然無一切穢雜故名淨土其人皆蓮華中生長生不老其景序常春無復寒暑大受快樂無一切苦惱故名極樂世界其佛梵語名阿彌陀者此云無量以我佛光明照見十方世界無有限量凡念佛衆生無不知之故又名無量光佛我佛壽命與其國中人民壽命皆無有限量雖恆河沙劫亦無有盡故又名無量壽佛我佛有大誓願誓願見後度人其威神不可思議故至心信向念其名號者西方七寶池中即生蓮華一朵他日於其中託生直脫輪回之外更得阿跋致華言不退轉彌陀經云極樂國土七重欄楯七重羅網七重行樹皆是四寶周匝圍繞又有七寶池八功德水充滿其中池底純以金沙布地四邊階道金銀琉璃玻璃合成上有樓閣亦以金銀琉璃玻璃硨磲赤珠碼瑙而嚴飾之池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔又常作天樂黃金為地晝夜六時雨天𭦟陀羅華又有種種奇妙雜色之鳥白鶴孔鸚鵡舍利迦陵頻伽共命之鳥是諸衆鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土衆生聞是音已皆悉念佛念法念僧是諸衆鳥非罪報所生皆是阿彌陀佛欲令法音宣流變化所作又微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心又云若善男子善女人聞説阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土大彌陀經云阿彌陀佛剎中皆自然七寶相間為地或純以一寶為地光色照耀奇妙清淨超越十方一切世界其國廓曠蕩不可窮盡地皆平正無須彌山及金剛圍一切諸山亦無大海小海及坑坎井谷亦無幽暗之所無地獄餓鬼畜生以至蜎飛蠕動之類無諸龍鬼神亦無雨露惟有自然流泉亦無寒暑氣象常春清快明麗不可具言阿彌陀佛講堂精舍皆自然七寶相間而成復有七寶以為樓觀欄楯復以七寶為之瓔珞懸飾其側復以白珠明月珠摩尼珠為之交絡遍覆其上殊特妙好不可勝言其餘菩薩聲聞所居宮宇亦復如是彼諸天及世人衣服飲食華香瓔珞傘蓋幢幡微妙音樂隨意而現所居宮宇樓閣稱其形色高下大小或以一寶二寶乃至無量衆寶悉化現而成然宮宇有隨意高大浮于空中若雲氣者有不能隨意高大止在地上如世間者其故非他能隨意者乃前世求道時慈心精進益作諸善德厚所致不能隨意者乃求道時不慈心精進德薄所致所以別進有勤惰德有大小示衆見之其內外復有自然流泉及諸池沼與自然七寶俱生有純一寶池者其底沙亦以一寶若黃金池者底白銀沙水晶池者底琉璃沙瑚池者底琥珀沙二寶為一池者底沙亦以二寶若三寶四寶以至七寶共為一池者其底亦如是此諸寶池有方四十里者有方五六十里者展轉漸大以至方二萬四百八十里皆菩薩聲聞諸上善人生長之所若彼佛池其方倍此是諸池者皆八功德水湛然盈滿清淨香潔味如甘露十方無央數世界諸天人民以至蜎飛蠕動之類往生阿彌陀佛剎者皆于七寶池蓮華中化生自然長大亦無乳養皆食自然之食諸菩薩聲聞諸上善人有時浴于其中意欲令水沒足水即沒足欲令至膝至腰以至於頸水亦如是欲令其水如初即亦如初調和冷暖無不順適開神悅體滌蕩情慮清明澄潔瑩若無形既出浴已各坐一蓮華上自然微風徐動吹諸寶樹或作音樂或作法音吹諸寶華皆成異香散諸菩薩聲聞之上諸菩薩聲聞有欲聞法音者有欲聞樂音者有欲聞華香者有皆不欲聞者其欲聞者輒獨聞之不欲聞者寂無所聞各適其意自然快樂隨往進修有在地講經者誦經者自説經者口授經者聽經者念經者思道者坐禪一心者經行者仍有在虗空中講經者誦經者自説經者口授經者聽經者念經者思道者坐禪一心者經行者其間有未得須陀洹者因是得須陀洹未得斯陀含者因得斯陀含未得阿那含者因得阿那含未得不退轉地菩薩者乃得不退轉地菩薩各隨其質而有所得諸寶池中其水轉相灌注不疾不徐波揚無量自然妙聲或作説佛聲或作説法聲或作説僧聲或作説寂靜聲説空無我聲説大慈悲聲説波羅蜜聲説十力無畏不共法聲説諸通慧聲説無所作聲説不起滅聲説無生忍聲乃至説甘露灌頂一切妙法等聲聞者喜悅無量發清淨心無諸分別正直平等成熟善根永不退于無上菩提于彼世界不復聞于地獄餓鬼畜生夜叉殺生偷盜鬪諍惡口兩舌如是等一切惡聲聞且絶無況有其實但有自然清淨之音自然快樂之事是故其剎名曰極樂池岸上有無數栴檀香樹吉祥果樹華果恆芳異香流布又有天優鉢羅華鉢曇摩華拘牟頭華芬陀利華雜色光茂彌覆水上復有七種寶樹其純一寶樹者根莖枝葉花果皆以一寶若二寶三寶乃至七寶為一樹者根莖枝葉花果亦復如是是諸寶樹種種各自異行行行相植列數百千重間以寶池亦復如是乃至周遍世界榮色光耀不可勝視清風時發自成微妙音聲無可比者復有種種自然妙樂而其音聲無非妙法清暢嘹喨微妙和雅諸往生者其飯食時有欲金鉢銀鉢者有欲水晶琉璃珊瑚瑪瑙或明月珠摩尼珠白玉紫金等鉢者皆隨其意化現在前百味飲食充滿其中多亦不餘少亦不缺食已自然化去再欲食時復現如前所欲衣服隨念即至不假裁縫搗染浣濯諸菩薩聲聞衆其面目皆端正靜好其材性皆智慧勇健其所欲言皆豫相知意心所存念無非道德形于談説無非正事動合禮義穆若弟兄轉相教令欽悅承受意皆潔清無所貪染淫泆嗔怒愚癡之態盡絶無餘樂從經道啓迪慧性通其宿命又有道場樹高一千六百由旬四布枝葉八百由旬根入寶地五百由旬及一切衆寶自然合成華果敷榮作無量百千殊麗之色于其樹上或時微風徐動演出無量妙法音聲其聲流布遍諸佛剎衆生聞者得深法忍住不退轉地無其耳病以至成就無上菩提若有衆生見此樹者乃至成佛于其中間不生眼病聞樹香者不生鼻病食樹果者舌亦無病樹光照者身亦無病觀想樹者心得清涼遠離貪等煩惱之病皆得甚深法忍住不退轉地復有無量寶網彌覆其剎又有自然德風徐動不寒不暑溫柔和軟不疾不遲吹諸寶網及諸寶樹演發無量微妙法音流布萬種清雅德香其有聞者塵勞垢息自然不生風觸其身自然快樂其間欲作佛者即令修菩薩行以至成佛既成佛已其有宿願度生則以弘誓功德入他方生死界中作獅子吼説法度脫爾時阿彌陀佛以威神力令彼教化一切衆生度脫十方無央數諸天人民以至蜎飛蠕動之類往生其剎者不可勝數作聲聞得泥洹道者亦不可勝數作菩薩以至成佛者亦不可勝數如是寶剎皆阿彌陀佛願力無邊威神廣大功德圓滿自然化現無窮無極不可思議晝夜一劫説不能盡今為汝等略言之耳十方世界諸天人民有至心欲生阿彌陀佛剎者別有三輩其上輩生者捨家棄欲而作沙門心無貪慕持守經戒行六波羅蜜修菩薩業一向專念阿彌陀佛修諸功德是人則于夢中見佛及諸菩薩聲聞其命欲終時佛與聖衆悉來迎致即于七寶水池蓮華中化生為不退轉地菩薩所居七寶宮宇在于空中去佛所為近其中輩生者雖不能往作沙門大修功德常信受佛語發無上菩提之心專向念佛隨力修善奉持齋戒起立塔像飯食沙門懸繒然燈散華燒香以此回向願生其剎命欲終時佛亦化現其身與諸大衆在其人前即隨往生亦住不退轉地次于上輩生者其下輩生者不能作諸功德不發無上菩提之心每日十聲念佛願生其剎命欲終時亦夢見佛遂得往生所居七寶宮宇惟在于地去佛所為遠若不能大精進禪定盡持經戒必修十善一不殺生二不偷盜三不邪淫四不調欺五不飲酒六不兩舌七不惡口八不妄語九不嫉妬十不貪欲不靳吝不嗔恨不邪見篤于孝順謹于誠信信受佛語晝夜思維阿彌陀佛是人命終心不顛倒即得往生永不退于無上菩提其次齋戒清淨一心常念阿彌陀佛欲生其剎十晝夜不斷絶者命終必得往生縱不能十晝夜當絶慮去憂勿與家事勿近婦人端身正心斷除愛欲齋戒清淨至心憶念彼佛誦持名號止一晝夜不斷絶者勝于阿彌陀剎中為善百歲所以者何以彼剎中人悉為善無毫髮之惡若此世界中為惡極多為善極少能自修治其功勝彼命終亦得往生若有善男子善女人發菩提心持諸禁戒堅守不犯饒益衆生所作善緣悉以施與令得安樂常憶念佛及彼剎境界是人命終往生賢聖圍繞速聞無上妙法諸往生者皆具足三十二相究竟深入妙法要義諸根明利其初鈍根者成就二忍利根者得不可計無生忍皆當一生遂補佛處復無三種過失一者心無虗妄二者住不退轉三者善無唐捐所以生于彼者有進無退直至成佛若有衆生修諸功德願生彼剎後有悔心亦復疑惑不信有彼佛剎不信有往生者其人雖爾續有念心暫信暫不信志意猶豫無所專據臨命終時佛乃化現其身令彼目見口雖不能言其心即喜乃悔不勉作諸善以悔過故亦生彼剎惟不能前至佛所方入其剎邊地見七寶城即入其中于蓮華中受身自然長大飲食亦皆自然其快樂如忉利天人惟于城中經五百歲不得見佛不見菩薩諸聲聞衆無由供養以此為苦示其小謫是故彼剎名為胎生當知生疑惑者失大利益世間人民前世為善常行佛道者乃得聞阿彌陀佛名號固非凡人若不生信心亦不信佛語者乃惡道中來餘殃未盡愚癡不解未當解脫又于劇惡極苦之中勤身營務以自給濟無貴賤貧富無少長男女皆憂財物纍念積慮為心走使無時安息有田憂田有宅憂宅有牛馬六畜奴婢衣食什物悉共憂之尊貴豪富既有斯患嬰結于心若貧窮下劣常苦困乏無田宅亦憂欲其有田宅無牛馬六畜等物亦憂欲其皆有適有一物復缺一物適有是事復缺是事勤苦若此休息無時不達于道德迷沒于嗔怒貪恨于貨色坐斯不得道當入苦惡趣展轉數千億劫無有出期痛不可言極可哀愍今語汝等世間之事擇其善者勤而行之愛欲榮華不可常保生老病死痛苦惡露不淨無可樂者宜自決斷端身正行益作諸善洗除心垢言行忠信表裏相應既得自度轉相拯濟雖現世勤苦亦須臾之間後生淨土快樂無極長與道德合明永拔生死根本吾哀世人教誨切至正法難聞當勤精進超生淨剎永離五趣若不信悟無益其人大命將至悔亦何及又云無量無數劫以前有世自在王佛出化度衆生是時有大國王往聽説法遂有覺悟乃捨國王之位而往修行號曰法藏比丘即阿彌陀佛也對世自在王發四十八願願願度人中一願云我作佛時十方無央數世界衆生至心信樂欲生我國十聲念我名號而不生者我不作佛是我佛自有誓願度人惟假人之十念以表歸依之心故人至心信向念其名號者現世必蒙福佑消除災障身後必往生極樂世界若念名號時一心觀想阿彌陀佛之形像臨命終時必見佛之真身前來接引又一願云十方無央數世界女人聞我名號喜悅信樂發菩提心厭惡女身壽終之後來生我剎其身不復為女以我佛威神廣大無所不在而人心念與佛純熟則自然感通故佛現其身也又云阿彌陀佛歷大阿僧祇劫行菩薩行忍力成就不計衆苦常以和顏愛語饒益衆生善護口業不譏他過善護身業不失律儀善護意業清淨無染口中常出栴檀之香身諸毛孔出優鉢羅華香無量衆生聞此香者皆發無上菩提之心手中常出一切衣服一切飲食一切幢幡寶蓋一切音樂及一切最上所需之物以此施惠衆生令生歡悅以行教化故致無量無數衆生發無上菩提之心如是善行無量無邊説不能盡歷無量無數百千萬億劫功德圓滿威神熾盛方得成就所願而入佛位是以十方無央數世界諸天人民以至蜎飛蠕動之類無所不度所以一念歸依遂生其國皆于七寶池蓮華中化生皆受自然清虗之身無極之壽遍彼剎中皆諸上善人無有婦女皆壽命無央數劫皆洞視徹聽遙相瞻見遙相聞語聲皆求善道者無復異人也又云釋迦佛一日容顏異常侍者阿難怪而問之佛言善哉汝所問者勝于供養一天下聲聞緣覺及布施諸天人民以至蜎飛蠕動之類雖至纍劫猶百千萬倍不可以及所以者何以諸天帝王人民乃至蜎飛蠕動之類皆因汝所問而得度脫之道以此觀之是釋迦佛初欲説阿彌陀佛之時其存于心而形于色者已異于平日則阿彌陀佛所以感諸佛者固已非常況于感一切衆生者乎觀其初發願偈云我至成佛時名聲超十方人天欣得聞俱來生我剎地獄鬼畜生亦生我剎中是則凡在三界六道輪回之內者無所不度可知已是以此經云阿彌陀佛現在西方極樂世界又在十方世界教化無央數諸天人民以至蜎飛蠕動之類莫不過度解脫者是其所以廣度衆生無有窮極而人一念歸依遂生其國無足疑也又云彌勒菩薩白佛言世尊于此世界有幾何不退轉地菩薩往生阿彌陀佛剎佛言此世界有七百二十億不退轉地菩薩往生彼剎及諸小菩薩修習少功德者不可勝計不但我剎他方佛剎乃至十方無量佛剎中其往生者甚多不可復計又云佛言天地之間五道昭明廓浩渺業報相生轉相承受美惡慘毒皆自當之善人行善從樂入樂從明入明惡人行惡從苦入苦從暗入暗世人昧此惡道不絶故有自然地獄餓鬼禽獸蜎飛蠕動之類展轉其中纍劫無由出離惟修淨土直得超去無量壽經云爾時韋提希號泣白佛言世尊願為我廣説無憂惱處我當往生不樂閻浮濁惡世也于是世尊放眉間光遍照十方世界諸佛國土皆于中現時韋提希見已向佛言是諸佛土雖復清淨皆有光明我今惟願生極樂世界阿彌陀佛所又云上品上生者若有衆生願生彼國者發三種心即便往生一者至誠心二者深心三者回向發願心復有三種衆生當得往生一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念回向發願願生彼國具此功德一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大衆無量諸天觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國見佛菩薩色身衆相具足演説妙法聞已即悟無生法忍經須臾間歷侍諸佛遍十方界於諸佛前次第授記還至本國得無量百千陀羅尼門上品中生者不必讀誦方等經典善解義趣于第一義深信因果不謗大乘以此功德回向求生極樂命欲終時阿彌陀佛與觀音勢至無量大衆眷屬圍繞持金剛臺至行者前讚言法子汝行大乘解第一義是故我今來迎接汝與千化佛一時授手行者自見坐紫金臺如一念頃即生彼國七寶池中此紫金臺如大寶華經宿則開佛及菩薩俱時放光照行者身目即開明即下金臺禮佛合掌經于七日應時即于阿耨多羅三藐三菩提得不退轉應時即能飛行遍至十方歷侍諸佛修諸三昧經一小劫得無生忍上品下生者亦信因果不謗大乘但發無上道心以此功德回向求生極樂國命欲終時阿彌陀佛及觀音勢至與諸眷屬持金蓮華化作五百佛來迎此人五百化佛一時授手讚言法子汝今清淨發無上道心我來迎汝即自見身坐金蓮華坐已華合隨世尊後即得往生七寶池中一日一夜蓮華乃開七日之中乃得見佛雖見佛身于衆好相心不明了三七日後乃了了見遊歷十方供養諸佛于諸佛前聞甚深法經三小劫得百法明門住歡喜地中品上生者若有衆生受持五戒不造五逆無衆過患以此善根回向求生極樂世界臨命終時阿彌陀佛與諸眷屬圍繞放金光色至其人所演説苦空無常無我讚歎出家得離衆苦行者見已心大歡喜自見己身坐蓮華臺䠆脆合掌為佛作禮未舉頭頃即得往生極樂世界蓮華尋開當華敷時聞衆音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫中品中生者若有衆生若一日一夜受持八齋戒一日一夜持沙彌戒一日一夜持具足戒威儀無缺以此功德回向求生極樂國命欲終時見阿彌陀佛與諸眷屬放金光色持七寶蓮華至行者前行者自聞空中有聲讚言善男子如汝善人隨順三世諸佛教法我來迎汝行者自見坐蓮華上蓮華即合生于極樂世界在寶池中經于七日蓮華乃敷開目合掌讚歎世尊聞法歡喜得須陀洹經半劫已成阿羅漢中品下生者若有善男子善女人孝養父母行世仁慈命欲終時遇善知識為其廣説阿彌陀佛國土樂事亦説法藏比丘四十八願聞此事已尋即命終譬如壯士屈申臂頃即生極樂世界生經七日遇觀音勢至聞法歡喜過一小劫成阿羅漢下品上生者或有衆生作衆惡業雖不誹謗方等經典如此愚人多造惡業無有慚愧命欲終時遇善知識為説大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀音勢至至行者前讚言善男子汝稱佛名故諸罪消滅我來迎汝行者即見化佛光明遍滿其室即便命終乘寶蓮華隨化佛後生寶池中經七七日蓮華乃敷當華敷時大悲觀世音菩薩放大光明住其人前為説甚深十二部經聞已信解發無上道心經十小劫具百法明門得入初地下品中生者或有衆生毀犯五戒八戒及具足戒偷僧祗物盜現前僧物不淨説法無有慚愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄衆火一時俱至遇善知識以大慈悲為説阿彌陀佛十力威德廣讚彼佛光明神力亦讚戒定慧解脫知見此人聞已除八十億劫生死之罪地獄猛火化為清涼風吹諸天華華上皆有化佛菩薩迎接此人如一念頃即得往生七寶池蓮華內經于六劫蓮華乃敷觀音勢至以梵音聲安慰彼人為説大乘甚深經典聞此法已應時即發無上道心下品下生者或有衆生作不善業五逆十惡具諸不善如此愚人以惡業故應墮惡道經歷多劫受苦無窮如此愚人臨命終時遇善知識種種安慰為説妙法教令念佛此人苦逼不遑念佛善友告言汝若不能念者應稱無量壽佛如是至心令聲不絶具足十念稱南無阿彌陀佛稱佛名故于念念中除八十億劫生死之罪命終之時見金蓮華猶如日輪住其人前如一念頃即得往生極樂世界于蓮華中滿十二大劫蓮華方開觀音勢至以大悲音聲為其廣説諸法實相除滅罪法聞已歡喜應時即發菩提之心大悲經云佛言我滅度後北天竺國有比丘名祁婆迦修習無量種種最勝菩提善根已而命終生于西方過百千億世界無量壽國于彼佛所種諸善根後當作佛號無垢光菩薩生地經云佛言時摩差竭得不起法忍五百清信士二十五清信女皆得不退轉地壽終俱生無量壽佛清淨國淨土傳云阿彌陀佛與觀世音大勢至二菩薩悲憫衆生乘大願船泛生死海就此娑婆世界呼引衆生上大願船送至西方若信心肯往雖有罪惡亦必得生彼土經云佛能度一切衆生不能度一切不信之人蓋信者一念也身壞時惟一念而已一念到處則無不到況佛與菩薩又招引人往生乎華嚴行願品云是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失乃至象馬車乘珍寶一切無復相隨惟此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界是故汝等聞此願王莫生疑念應當諦受藥王菩薩本事品云聞是經典如説修行於此命終即往安樂世界阿彌陀佛大菩薩衆圍繞住處生蓮華中寶座之上法華經云若人散亂心入於塔廟中一稱南無佛皆已成佛道大智度論云佛是無上法王諸大菩薩以為法臣諸臣所尊重者惟佛法王也有諸菩薩自念往昔謗般若墮惡道受無量苦復經無量劫來雖修餘行不能得出苦海後遇善知識教念阿彌陀佛即得除滅罪障超生淨土我今應當禮謝阿彌陀佛何以故父母親友人天王等不能度我出離苦海惟阿彌陀佛願力攝受是以得出苦海偈云若人願作佛心念阿彌陀即得為現身故我歸命禮無為楊傑次公少登高科明禪門宗旨謂衆生根有利鈍即其近而易知簡而易行者唯西方淨土但一心觀念仗佛願力直生安養即淨土故華嚴經載解脫長者子云知一切佛猶如影像自心如水我若欲見安樂世界阿彌陀如來隨意即見是知衆生注念定見阿彌陀佛若生彼土則無衆苦般舟三昧經云跋陀和菩薩問釋迦佛云未來衆生云何得見十方諸佛佛教令念阿彌陀佛即見十方一切諸佛又大寶積經云若他方衆生聞無量壽如來名號乃至能發一念淨信歡喜愛樂所有善根回向願生其國者隨願往生得不退轉此皆佛言也不信佛言何言可信不生淨土何土可生蘇東坡云次公晚年作監司太字畫丈六阿彌陀佛像隨行供養觀念至壽終時感佛來迎端坐而化其辭世頌曰生亦無可戀死亦無可捨太虗空中之乎者也將錯就錯西方極樂釋迦佛在世時有翁婆二人用穀一斗記數念阿彌陀佛願生西方佛云我別有方法令汝念佛一聲得多穀之數乃教以念西方極樂世界三十六萬億一十一萬九千五百同名同號阿彌陀佛出寶王論嘗以秈穀校之一合千八百粒此數乃二千石之數佛自以此教二老人則其功德甚大可知矣真言字本非佛國字乃譯經者所用人以其字難識而不讀佛初説時止有音聲今存其聲音用易識之字代之又世間點句多差今用藏經兩處點句一同更不須疑誦此呪者阿彌陀佛常在其頂不令冤家為害現世安穩命終任意往生若滿二十萬遍即菩提芽生三十萬遍不久面見阿彌陀佛今依藏經點句載覽南謨阿彌多婆夜哆拖伽哆夜哆𨽻夜哆阿彌里都婆毗阿彌里哆悉耽婆毗阿彌里哆毗加蘭帝阿彌里哆毗加蘭哆加彌膩伽伽那止哆加唎娑婆訶淨土起信王龍舒云豫遍覽藏經及諸傳記取其意為淨土文無一字無所本幸勿以人微而忽其説欲人人共曉故其言直而不文淨土之説多見于日用之間而其餘功乃見于身後不知者止以為身後之事而已殊不知其大有益于生前也何則佛之所以訓人者無非善與儒教之所以訓人何以異哉故其以淨土為心則見于日用之間者意之所念口之所言身之所為無適而非善善則為君子為大賢現世則人敬之神祐之福祿可增壽命可永庸人稍知佛理者世必目之為善人此其效也由是言之則從佛之言而以淨土為心者孰謂無益于生前乎或曰從孔子之言而以儒教為心豈不益于生前何必淨土哉曰此世間法耳非出世間法世間法則不出于輪回出世間法則直脫輪回之外淨土既益于生前又益于身後者以其兼世間出世間法故也淨土之説有理有迹論其理則見于日用之間而未常離前篇所言是也論其迹則見于三時一茶之頃而不必終日泥十念法門是也蓋修持法門有九品人人皆可以修雖罪惡之人佛亦不棄回心向善即為善故雖屠宰之人放下屠刀亦可以修所以修者不難亦不妨一切俗事故在官不妨職業在士不妨修讀在商賈不妨販賣在農人不妨耕種在公門不妨事上在僧徒不妨參禪凡一切所為皆不相妨故曰其修持工夫見于三時一茶之頃耳遂可以為萬萬劫不壞之資用力甚易而收功甚大人何為而不修乎及此不修可痛惜哉可痛惜哉人驟聞淨土之景象多不信之無足怪也蓋處此娑婆濁世惟知生長于胞胎不知彼有蓮華之化生壽不過百年不知彼有河沙之壽數衣食必由于營作不知彼有自然之衣食快樂常雜于憂惱不知彼有純一之快樂遂將佛之所言等于幻妄而不之信殊不思佛切戒人以妄語必不自妄語以誑人其言可信無足疑者故先賢云佛言不信何言可信況自古及今修此者感應甚多猶不可以不信者也世有專于參禪者云惟心淨土豈復更有淨土自性阿彌不必更見阿彌此言似是而非也何則西方淨土有理有迹論其理則能淨其心故一切皆淨誠為惟心淨土矣論其迹則實有極樂世界佛丁寧詳復言之豈妄語哉人人可以成佛所謂自性阿彌者固不妄矣然猝未能至此譬如良材可以雕刻物像而極其華麗必加以雕刻之功然後能成不可遽指良材而遂謂極物像之華麗也又或信有淨土而泥惟心之説謂現前即是西方不足生者謂參禪悟性超佛越祖阿彌不足見者皆失之矣何則此言甚高竊恐不易到彼西方淨土無貪無戀無嗔無癡吾心能無貪戀無嗔癡乎彼西方淨土思衣得衣思食得食欲靜則靜欲去則去吾思衣而無衣則寒惱其心思食而無食則飢惱其心欲靜而不得靜則羣動惱其心欲去而不得去則繫纍惱其心是所謂惟心淨土者誠不易到也彼阿彌陀佛福重山海力挈天地變地獄為蓮華易于反掌觀無盡之世界如在目前吾之福力尚不能自為常恐宿業深重墜于地獄況乃變作蓮華隔壁之事猶不能知況乃見無盡世界乎是所謂自性阿彌者誠不易到也然則吾心可以為淨土而猝未能為淨土吾性可以為阿彌而猝未能為阿彌烏得忽淨土而不修捨阿彌而不欲見乎故修西方見佛而得道則甚易若止在此世界欲參禪悟性超佛越祖為甚難況修淨土者不礙于參禪何參禪者必薄淨土而不修也大阿彌陀經云十方有無量菩薩往生阿彌陀佛國彼菩薩尚欲往生我何人哉不欲生彼是果勝于諸菩薩乎不仰藉阿彌陀佛慈力往生彼國又果勝于阿彌陀佛乎由此言之惟心淨土自性阿彌者高而寡效修未到者誤人多矣不若腳踏實地持誦修行則人人必生淨土徑脫輪回與虗言無實者天地相遠矣淨土或問云今禪者見修淨土鄙之為愚夫愚婦此非鄙愚夫愚婦也乃鄙文殊普賢馬鳴龍樹也何以故觀佛三昧經文殊菩薩偈云願我命終時滅除諸障礙面見彌陀佛往生安樂剎華嚴行願品普賢菩薩偈云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎起信論馬鳴菩薩示最勝方便謂專意念佛即得往生終無有退楞伽經佛告大慧大名德比丘厥號為龍樹初得歡喜地往生安樂國以上略舉四大菩薩其餘菩薩修淨土者不可勝紀下劣凡夫焉得忽淨土而不修參禪一法固為了悟生死而設修淨土一法亦是令衆生了悟生死也參禪有省則現世了悟生死得生淨土則見阿彌陀佛而後了悟生死況即證無生忍居不退轉地直至成佛而後已大善知識未嘗不以此教人初機參學人何為薄淨土而不修乎蓮宗寶鑑云世人稍利根便輕視念佛謂是愚夫愚婦勾當彼徒見愚夫愚婦口誦佛名心遊千里不知此等是名讀佛非念佛也念從心心思憶而不忘故名曰念然人之一心不思正則思邪不思理則思欲今人念念思憶五欲不覺其非反以念佛為非不亦惑之甚哉人有不信因果從而不信淨土者夫因果烏可以不信乎要知前世因今生受者是要知後世果今生作者是若不信此語何不以目前之事觀之人生所以有富貴貧賤有苦樂勞逸有榮辱壽夭其禍福種種不同雖曰天命天豈私于人哉蓋以其人前生所為有善惡故今生受報有禍福是以此身謂之報身報身者報我前生所為故生此身也以其前生所為不能純乎善故今生亦不得純受其福報有富貴而苦夭者有貧賤而壽樂者有榮寵而悴辱者如影隨形如響應聲纖毫不差故云種桃得桃種李得李惟種時少收穫時多故作善惡時甚小受禍福之報甚大故云春種一粒粟秋收萬顆子人生為善惡果報還如此蓋造化自然之理也此理可信則淨土之説必可信何則二者皆佛言也佛誠言于因果必不妄言于淨土故因不信因果從而不信淨土者此可以解其惑矣或者疑云此間念佛西方七寶池中如何便生蓮華一朵曰此不難知也譬如大明鏡凡有物來便現其影鏡何嘗容心哉以其明而自然耳阿彌陀佛頂中光明清淨圓滿自然照見十方世界是故此間念佛西方七寶池自然生蓮華一朵無足疑也或又疑念往生真言者阿彌陀佛常住其頂若無量世界衆生念此真言阿彌陀佛豈能一一遍住其頂乎曰亦自然耳譬如天上一月普現一切水中豈不自然哉人生時父母妻子屋宅田園牛羊車馬以至檯凳器皿衣服及細微帶索等物不問大小色色認為己物倉庫既盈心猶未足金珠已多營猶未止舉眼動步無非愛著一宿在外已念其家一僕未歸已憂其失種種事務無非挂懷一旦大限到來盡皆拋去雖我此身猶是棄物況身外者乎靜心思之恍如一夢古人有言一日無常到方知夢裏人萬般將不去惟有業隨身妙哉此言也豫故用其後二句續成一偈云萬般將不去惟有業隨身但念阿彌陀定生極樂國蓋業者謂善業惡業此皆將得去者豈可不以淨土為業乎昔佛問阿難云汝欲見地獄人否阿難云欲見佛云身行惡口言惡意念惡此地獄人也蓋謂人生善惡不過身口意三業若三業俱惡是為純黑業所以入地獄若三業俱善則為純白業乃生天堂若三業中有一業善則為雜業亦不入地獄故身意雖惡而口念佛名亦一業善遠勝于三業俱惡況口念佛時又能心想佛像則意業善端正其身而手提數珠則身業善常能善此三業以修淨土必上品生或曰人誦佛名連稱不絶正如呼一人頻呼不止其人必怒則是專誦佛名者未足為善也是不然衆生自無始以來口業過惡積如山海多誦佛名以滌蕩之猶懼不足豈可以稱呼常人之名為比也況佛自開此念誦法門所以誘掖衆生善其口業以漸善其身意者至矣其謂專誦佛名未足為善者世俗愚昧之説非諸佛誘掖衆生之言何足齒焉據佛所言口業果報多于身意二業以發意則未必形于外出口則遂見矣舉身為惡猶有時艱阻不若口之易發也且如人有一言稱人或勸人其人終身受賜有福及子孫者一言陷人或唆人其人終身受害有纍及子孫者口業豈不重哉全持齋戒又禮佛念佛讀誦大乘經典解第一義以此回向願生西方必上品上生所謂齋者何哉不食肉不飲酒不淫欲不食五辛所謂戒者何哉殺生偷盜邪淫是謂身三業妄言綺語兩舌惡口是謂口四業貪欲瞋恨邪見是謂意三業總為十戒若修淨土者全持十戒加以如上文所言功德固上品上生矣若止持五戒而修淨土亦不失中品下生或下品上生也若又不能持五戒豈可以不戒殺生乎殺生為五戒之首亦為十戒之首亦為比丘二百五十戒之首是不殺則為大善殺則為大惡故殺生不可不戒也凡殺生以資口腹則口腹之欲何厭放箸之後滋味已空而殺業具在若殺生以待賓賓則以平日不殺亦無過責況其罪己自當之經云來而獨自來去而獨自去輪回獨自行果報獨自受觀此則豈可為人而殺生也若殺生以祭先祖豈無素食清羞孔子雖蔬食菜羮瓜祭必齋如也如是何有不可哉若然香誦經仗佛力以為薦自得超生故亦不在殺生也若止能持此不殺之一戒以修淨土已不在下品生矣楞伽經云有無量因緣不當食肉衆生肉本非所宜食以耳聞目見慣熟不知其非如能斷去固為上也如不能斷且食三淨肉而減省所謂不見殺不聞殺不為己殺是也如食兼味且去其一如兩餐皆肉且一餐以素人生祿料有數若此自可延壽更當為此衆生念誦資薦庶可釋冤滅罪據閻羅王告鄭鄰之言則至誠為彼念佛必得超度往生觀音感應記云饒州軍典鄭鄰誤追至陰府放還閻王告云汝還人間勉力為善汝見人殺生但念阿彌陀佛與觀世音菩薩彼得受生汝亦得福由此推之足以見念阿彌陀佛誠可薦亡者增延福壽不獨身後生西方也下品下生者乃臨終地獄形相已現能至心十念南無阿彌陀佛則變地獄為蓮華亦生淨土良由我佛慈悲至深威力至大故能如此然所謂十念者乃生前自己十聲念阿彌陀佛非身後倩人念也生前自念者臨命終時佛與菩薩自來迎接故亦必生淨土或云平生殺害衆生苦虐人民臨死念佛便得往生其所殺所苦之衆生懷冤負枉何時而可解乎答云生淨土得道之後然後度脫一切冤親豈不勝于冤冤相報彼此無出期者乎蓮宗寶鑑云惡人必不回心念佛其有念佛者偽也非真念也若真能一心念佛即取給於臨終之十念亦必往生況善人一心念佛而有不生西方者乎我輩既修淨土止愁不到一心不亂田地若一心不亂任他千譏萬謗當巍巍不動如泰山矣更何疑哉淨土指歸云欲了生死修行淨業當發十種信心念念不忘決生淨土一信佛所説法金口誠言真實不虗二信凡夫在迷識神不滅六趣循環不息三信此土修行未得道果不免輪回四信未出輪回雖生天上不免墮落五信極樂世界衆生生者永無退轉六信衆生發願願生淨土決定往生七信一稱佛名能滅八十億劫生死重罪八信念佛之人阿彌陀佛神通光明攝取不捨九信念佛之人十方世界恆沙諸佛同以神力時常護念十信既生淨土壽命無量一生當得無上菩提于此十種不能深信生疑惑者雖念佛不得往生又有一種常情謂念佛乃老年事方當少壯未暇及此一旦無常措手弗及咦莫待老來方念佛孤墳多是少年人今為再設方便當少壯時即須信向每日早晨盥嗽畢虔心面西止用十念工夫專精念佛十聲即回向云願我臨命終時往生西方極樂世界持至半老加功精進亦必往生是書乃原本龍舒推廣至教以補法寶之所未備凡我善信得是書者切宜仰體佛祖弘慈公諸同志轉相勸諭萬弗束之高閣及等間委棄沉埋法寶慢褻聖賢罪莫可逭戒之戒之如有遠方善信欲廣其傳捐資重刻流播十方功德無量決定往生勉之勉之淨土定式每日早中晚三時焚香合掌向西頂禮兩目上視儼覩慈顏先念南謨本師釋迦牟尼佛一拜南謨西方極樂世界阿彌陀佛一拜南謨大悲觀世音菩薩一拜南謨大勢至菩薩一拜南謨一切菩薩聲聞諸上善人一拜拜畢復合掌頂禮觀想己身在蓮華內仰對阿彌陀佛丈六金身在大蓮華金臺上兩眉中間向上有白毫一條八稜中空之像隨念南謨阿彌陀佛十聲又觀想觀世音菩薩丈六金身在大蓮華內垂手接引隨念南謨觀世音菩薩十聲又觀想大勢至菩薩丈六金身在大蓮華內隨念南謨大勢至菩薩十聲又觀想遍界菩薩衆俱在蓮華內隨念南謨一切菩薩聲聞諸上善人十聲復頂禮念大悲菩薩讚佛懺罪回向發願偈一遍十方三世佛阿彌陀第一九品度衆生威德無窮極我今大歸依懺悔三業罪凡有諸福善至心用回向願同念佛人感應隨時現臨終西方境分明在目前見聞皆精進共生極樂國見佛了生死如佛度一切念畢回向云弟子某虔誦聖號專求臨命終時仗佛菩薩慈悲接引往生西方極樂世界一拜隨觀想己身在蓮華內直達西方親見我佛菩薩良久又念南謨西方極樂世界三十六萬億一十一萬九千五百同名同號阿彌陀佛七遍畢回向云弟子某虔誦聖號專為超度此南閻浮提今生宿世祖宗父母伯叔兄弟子孫妻女宗親外戚僕從使女師徒朋友恩主冤家已相識未相識乃至所殺所食為絲為綿之衆生盡生極樂世界一拜又念大悲呪七遍往生呪七遍畢回向云願我今生臨命終時仗此二神呪力往生西方極樂世界隨觀想己身在蓮華內直達西方親見我佛菩薩良久功畢餘功誦彌陀經一卷念佛千聲或五百聲或三百聲隨力念之不拘多寡每日如此專志修持其往生品地必高舊法早中晚三時修習者為通緇素而定也若出家者無事擾心應當六時禮誦若在家者世事稍暇亦須三時禮誦再或冗忙只早晚亦可如萬難脫身早晨一時斷不可缺凡念佛者有默持有高聲持有金剛持然高聲覺太費力默念又恐昏沉只是綿綿密密聲在唇齒之間乃謂之金剛持三者隨其意之所之不必執定久久自有利益今之念佛者只是隨口呌喊所以不得利益必須句句出口入耳聲聲喚醒自心則自有得力處矣若有女人及愚鈍人不能多記者只用前段十念工夫亦可不能誦大悲呪只誦往生呪或二十一遍或四十九遍亦可不能誦彌陀經只隨力念佛亦可總之用工不拘多寡只在信向不輟亦必往生修持要約平時齋戒潔已清心靜慮面西安坐閉目默然觀想阿彌陀佛真色金身在西方七寶池中大蓮華上座其身長丈六兩眉中間向上有白毫一條八稜中空光明照耀金色面與金色身更不得妄有分毫他念當令閉眼開眼悉皆見之如此久久念心純熟自然感應見佛金身此法最為上等蓋心想佛時此心即是佛又勝于口念也身後必上品上生更于行住坐臥著衣喫飯一切時中默然舉念南無阿彌陀佛即返觀自照這念佛求生淨土的是誰良久又念如是參究工夫勿令間斷忽然親見彌陀盡大地是個西方淨土蓮宗寶鑑云修淨土人凡欲入觀正念西向一心觀想阿彌陀佛而坐或欲行時一心觀想阿彌陀佛而行或欲睡時一心觀想阿彌陀佛而臥功深力久或于正觀念時即得見之或于睡夢中見之但辦至誠必如所願觀經云觀想阿彌陀佛身相光明如百千萬億閻浮檀金色閻浮檀金者極大極美之金也佛身高六十萬億那由他恆河沙由旬那由他者萬億也由旬者十六里也眉間白毫如五須彌山佛眼如四大海水清白分明以無緣慈攝取衆生兼觀想觀世音菩薩身長八十萬億那由他由旬身紫金色手掌作五百億雜蓮華色有八萬四千光其光柔軟以此寶手接引衆生次觀想大勢至菩薩身長八十萬億那由他由旬舉身光明作紫金色有緣衆生皆得悉見隨想己身亦在七寶池蓮華內結跏趺坐見佛菩薩并見諸佛蓮華滿虗空界如此觀想善根愈大倘或未能且想丈六小像亦可大悲懺文云觀世音菩薩常白佛言若諸衆生受持大悲神呪不生諸佛國者我誓不成正覺是菩薩全以悲願度人大勢至菩薩以念佛證無生忍究其因地純于念佛上用工念念無間打成一片蓋佛者心也念佛念心心心不二佛佛皆然一念貫通是真淨土念佛之旨大略如斯遠公祖師得是三昧以示百二十二人及十八大賢同修同證思專想寂以至究竟六祖讚云念此一句阿彌陀佛是萬世出世之妙道成佛作祖之正因此句是三界人天之眼目明心見性之慧燈此句是十方虗空之無際廣大一性之圓明此句是五千大藏之骨髓八萬總持之要門此句是渡苦海之舟筏最尊最上之法門所有四衆弟子若要心性明朗時時念想彌陀名號念滿成功徑往西方極樂世界面見彼佛親承授記因誓曰我若妄語誑衆生自遭拔舌塵沙劫永明壽禪師四料揀云有禪無淨土十人九錯路陰境若現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不開悟有禪有淨土猶如帶角虎現世為人師當來作佛祖無禪無淨土鐵床并銅柱萬劫與千生沒個人依怙靈芝法師云博地凡夫惑業纏縛流轉五道百千萬劫受諸苦惱忽聞淨土志願求生一日稱名即超彼國若人肯念阿彌陀佛超過一切善根何則雖修一切福業若無正信求生淨土皆為小善根也若念阿彌陀佛發願求生淨土是為大善根也億佛念佛現前當來必定見佛如染香人身有香氣如此繫心任運常遮一切惡念設欲作惡心常下耎惡不能成如身有香自然離臭又復覺心微起惡念即便憶佛以佛力故惡念自息又若覺他受苦時以念佛心憐憫于彼願其離苦若斷刑獄以念佛故生憫念心雖依正法當密作願云我行王法非我本心願生淨土誓相救濟凡修淨土須是自信自行自辦工夫努力向前灼然要敵他生死始得若也半信半疑如何出得輪回若是信得及便從今日發大勇猛大精進莫問會與不會但只執持一句南無阿彌陀佛如靠一座須彌山相似搖撼不動專其心一其意或參念或觀念或十念或臆念或默念或禮念念茲在茲朝也念暮也念行也念坐也念日日時時不要放捨工夫如此把得定做得主縱遇苦樂順逆境界現前只是念阿彌陀佛無一念退惰心決定要生西方極樂世界臨命終時定生上品其或力量未充應須隨力修習朝昏禮念縱使家緣冗繁無忘十念稱名猛著精彩積功纍行誓畢此生同登淨域方為了事要知此事決定不在廣設道場多點香燭上決定不在有傳有授扭揑做作上決定不在會説會道廣化人緣上此等之人所謂著事相而疏正理順聲色而背真宗數他寶而已無半錢者也須是以念佛為正行而兼修福德諸惡莫作衆善奉行所修一切善根悉皆回向願生淨土自然善果圓成有行有願直入無為此乃佛祖修淨業之本也今人皈依佛會或為病苦或為報親或為消災祈福或為修積來生皆是了還心願只求富貴榮華誇耀塵世罕有為自己生死發願念佛往生淨土者如此妄想不合佛祖本願縱使一生修誦錯用工夫臨終不得往生凡曰作福盡屬有為乃世間有漏之因非出世無為之道修行佛子宜善思惟一念回光願捨娑婆往生淨土譬如遊子久客他鄉復歸故里凡念佛人塵根未淨惡念起時須自檢點或有慳貪心嗔恨心癡愛心嫉妬心欺誑心吾我心貢高心諂曲心邪見心輕慢心能所心及諸隨染所生一切不善之心設或起時急須高聲念佛斂念歸正直下打併淨盡勿令相續所有深信心至誠心慈悲心謙下心平等心方便心忍辱心持戒心喜捨心禪定心精進心菩提心及一切善心常常守護但能依法修持是為淨土正行初學對治昏散之心數息最要凡欲坐時先想己身在圓光中默觀鼻端想出入息每一息默念南無阿彌陀佛一聲方便調息不緩不急心息相依隨其出入勿令間斷行住坐臥常自密密行持久久純熟忽爾心眼開通三昧現前即是唯心淨土天台十疑論云一切諸佛悉皆平等但衆生根鈍濁亂者多若不專心係念一佛則心散漫三昧難成故專令念阿彌陀佛即是一相三昧寶王論云修持一相三昧者當于行住坐臥係念不忘縱令昏𥧌亦係念而寢覺即續之不以餘業間斷不以貪嗔等間隔隨犯隨懺悔念念常清淨圓明即是一相三昧也又須發救度衆生心發至誠心發堅固心發深心加以禮拜念佛如此則現世蒙佛加佑身後必上品上生救度衆生心者願生淨土見佛得道後救度苦海衆生非獨度自身也至誠心者直心歸向無邪曲也堅固心者堅持精進更不退轉也深心者用心深至直透淨土如探海底明珠也三世諸佛與法界衆生皆由心造吾心如是焉得不上品上生人生皆如水泡生滅不常或一歲二歲或一十二十幸而至五六十亦為難矣況世間無非是苦但不思省故不覺知不稱意時固為苦矣即或稱意亦無多時父母妻兒或疾病死亡或殺傷離散或自己大限忽然而至平生罪惡豈得全無自少至老積纍既多閉眼之後不免隨業緣去或墮地獄受諸極苦或為畜生受人宰殺或生餓鬼飢火燒身或入修羅嗔恨戰鬪即有善業得生天上人間受盡福報依舊輪回漂流汩沒無有出期惟西方淨土最為超脫輪回之捷徑更得不退轉色身難得趂康健時辦此大事當常作念云吾自無始以來輪回六道不知有此法門故不出離今日知之豈可不即時下手年高者固當急急勉力年少者亦不可因循平時豫備工力純熟臨命終時徑生極樂世界視死入地府見閻王受譴責者相去萬萬矣況其工甚易行盡大藏中八萬四千法門無如此之要捷者而人或不知可痛惜哉知而不可尤可痛惜也凡受師友之訓誨恩地之提挈交遊之禮遇悉皆告以淨土而為之報以至與一切人或一飯一茶一言一坐下至僕隸有事我之勞者皆以此告之使脫離苦海即一切知與不知識與不識皆以是化之使共生淨土又一切飛禽走獸蜎飛蠕動之類遇彼宰殺受困時皆當為念阿彌陀佛數聲或往生呪數遍云願汝往生極樂世界乃至形相不可見者亦當作是念言如此則吾善念純熟臨終上品上生必矣大慈菩薩勸修西方偈云能勸二人修比自己精進勸至十餘人福德已無量如勸百與千名為真菩薩又能過萬數即是阿彌陀勸人善道名為法施勸修淨土又法施之最大者齋僧供佛燒香獻花懸幡建塔念佛禮懺種種三寶上崇奉以此功德回向願生西方或為世間種種利益方便善事若為子盡孝為兄友愛為弟敬長鄉黨鄰里姻親相接以禮相與以恩以至事君則盡忠為官則盡仁為下則勤以事上或教導愚迷或扶助孤弱或濟急難或惠貧窮或修橋砌路或施藥散食或減己奉養以利他人或臨財饒人以自省約或教人為善或讚善止惡隨力所作世間一切善事不拘大小不拘多少以此回向願生西方常使一念不斷念茲在茲必上品上生佛言欲修淨土當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三皈具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘解第一義勸進行者此三世諸佛淨業正因三皈謂皈依佛法僧也人子于父母服勞奉養以安之孝也立身行道以顯之大孝也勸以念佛法門俾得往生淨土大孝之大孝也奉告世人父母在堂早勸念佛更須教以至誠信向一心專念寶積經云世尊父王頂禮佛足一心合掌而白佛言云何修行當得佛道佛言一切衆生皆即是佛汝今當念西方世界阿彌陀佛常勤精進當得此道觀此則知為人子者斷當勸進父母矣呂文正公每晨興禮佛祝云不信三寶者幸勿生我家願子孫世世食祿護持佛法後呂氏所出若公著若好問若用中皆貴顯而奉佛竟酬所願況求生淨土取必于自己而有不可必得者乎凡在家菩薩無檀信之齋供必須隨順正法度日資生或田疇力作或市井經營或富有家資或日求升斗勤則不缺儉則不奢如此修行方為佛子所以潭州黃老常打鐵以修行居士龐公賣笊籬而養道喻彌陀畫像為業戴佛菴發燭資身可謂一日不作一日不食矣善導和尚臨終往生正念文曰凡一切人命終欲生淨土須是不得怕死常念此身多苦不淨惡業種種交纏若得舍此穢身超生淨土受無量快樂解脫生死苦趣乃是極稱意之事如脫斃衣得換珍服但當放下身心莫生戀著凡遇病時便念無常一心待死叮囑家人及往來問候人凡來我前為我念佛不得説眼前間雜之話家中長短之事亦不須溫言相慰祝願安樂若病重將終之際親屬不得垂淚哭泣及發嗟嘆懊惱之聲惑亂心神失其正念但一時同聲念佛待氣盡良久方可哀泣才有絲毫繫戀便成礙不得解脫若得明曉淨土之人頻來䇿勵極為得力若依此者決定往生斷無疑也知歸子問曰平生未念佛人還用得否答曰此法僧人俗人未念佛人用之皆得往生決定無疑常見世人平常念佛禮讚發願求生西方甚是勤拳及至臨病却又怕死都不説著往生淨土之事直待氣消命盡方始十念鳴鐘却如賊去關門濟何事也生死事大須是自家著力始得若一念差錯歷劫受苦誰人相代思之思之若無事時常以此法精進受持是為臨終大事佛言若人命終之際豫知時至正念分明洗浴著衣吉祥而逝光明照身見佛相好衆善俱見定知此人決定往生淨土天台十疑論云臨終念佛名最後心其心猛利一念佛名即生淨土蓋垂死時其心猛健決定勝于百歲行力故能感佛來迎即生彼土也蓮池大師曰念佛法門不論男女僧俗不論貴賤智愚不論老少疲癃但一心不亂隨其功行大小九品往生故知世間無有一人不堪念佛試為衆等言之若人富貴受用現成正好念佛若人貧窮家小纍少正好念佛若人有子宗祀得託正好念佛若人無子孤身自由正好念佛若人子孝安受供養正好念佛若人子逆免生愛戀正好念佛若人無病趁身康健正好念佛若人有病切近無常正好念佛若人年少精神強健正好念佛若人年老光景無多正好念佛若人處間心無事擾正好念佛若人處忙忙裏偷間正好念佛若人出家逍遙物外正好念佛若人在家知是火宅正好念佛若人聰明通曉淨土正好念佛若人愚魯別無所能正好念佛若人持律律是佛制正好念佛若人看經經是佛説正好念佛若人參禪禪是佛心正好念佛若人悟道道須佛證正好念佛普勸世人火急念佛九品往生華開見佛見佛聞法究竟成佛始知自心本來是佛真歇了禪師云捷徑法門惟有念佛功高易進若不念佛而求出離者終無所獲普勸清信一心念佛求願往生決矣不誤明教大師云吾勸學道者若不能頓悟且把一句阿彌陀佛常憶常念常覺常照何以故此時縱然未悟臨命終時仗彼佛力必得往生既得往生何愁不悟諸仁者要知念佛一門實乃超出餘門之上天如祖師云世人愚昧特甚教他念佛往生每自諉凡夫如何敢望必待來世再修不知念佛法門一念信心彈指可到總仗佛力接引何待來生先德云此身不向今生度更向何生度此身斯言誠宜三復宗本法師禪宗淨土難易説今世人提公案做工夫只期參禪悟道不願往生淨土此法何如答曰利根上智之人可以直參實悟略有差訛便成大錯何以故參禪悟道者難念佛往生者易古德云參禪要了生死百無二三念佛求生淨土萬不失一正所謂有禪無淨土十人九錯路也法門固有八萬四千總不如一句阿彌陀佛淨土扶迷獅子峯如如顏丙勸修淨業文身為苦本覺悟早修只這色身誰信身為苦本盡貪世樂不知樂是苦因浮生易度豈是久居幻質非空總歸磨滅自未入胞胎之日寧有這男女之形只緣地水火風假合而成不免生老病死雕殘之苦上無絲線可挂下沒根株所生虗浮如水上泡須曳不久危脆似草頭露倐忽便無長年者不過六七十以皆亡短命者大都三二十而早夭又有今日不知來日事又有上床別了下床時幾多一息不來便覺千秋永別雪峰頌一盞孤燈照夜臺上床脫了襪和鞋三魂七魄夢中去未委明朝來不來嘆此身無有是處奈誰人不被他瞞筋纏七尺骨頭皮褁一包肉塊九孔常流不淨六根恣逞無明髮毛爪齒聚若堆塵涕淚津液污如行廁裏面盡蛆蟲聚會外頭招蚊虱交攢沾一災一疾皆死得人更大熱大寒催人易老眼被色牽歸餓鬼耳隨聲去入阿鼻口頭喫盡味千般死後只添油幾滴長魁詩云紅紅白白莫相瞞無位真人赤肉團敗壞不如豬狗相只今便作死尸看此身無可愛惜諸人當願出離如何迷昧底尚逞風流懵懂漢猶生顛倒或有骷髏頭上簪花簪草或有臭皮袋畔帶麝帶香羅衣了膿血囊錦衣遮却屎尿桶用盡姦心百計將謂住世萬年不知頭痛眼花閻羅王接人來到那更鬢斑齒損無常鬼寄信相尋個個戀色貪財盡是失人身捷徑日日飲酒食肉無非種地獄深根眼前圖快活一時身後受苦辛萬劫淨土文皮包血肉骨纏筋顛倒凡夫認作身到死始知非是我從前金玉付他人一旦命根絶處四大風刀割時外則腳手牽抽內則肝腸痛裂縱使妻兒相惜無計留君假饒骨肉滿前有誰替汝古頌父母恩深終有別夫妻義重也分離人情似鳥同林宿大限來時各自飛生底只得悲啼痛切死者不免神識奔馳前途不見光明舉眼全無伴侶過奈河橋見之無不悲傷入鬼門關到者盡皆悽慘世上才經七日陰間押見十王曹官抱案沒人情獄卒持叉無笑面平生作善者送歸天道仙道人道在日作惡者押入湯塗火塗刀塗鑊湯沸若崖崩劒樹勢如山聳灌銅汁而遍身肉爛吞鐵丸而滿口煙生遭銼磕則血肉淋漓人寒氷則皮膚凍裂身碎業風吹再活命終羅剎喝重生人間歷盡百春秋獄內方為一晝夜延光集鑊湯爐炭喧幽壞劍樹刀山聳太清受罪要終八萬劫獄卒牛頭始放行魂魄雖歸鬼界身尸猶臥棺中或隔三朝五朝或當六月七月腐爛則出蟲出血臭穢則熏地熏天胖脹不堪觀醜惡真可怕催促付一堆野火斷送埋萬里荒山昔時要悄紅顏翻成灰燼今日荒涼白骨變作泥堆寒山頌胭脂畫面嬌千樣龍麝熏衣悄百般今日風流都不見緑楊芳草髑髏寒從前恩愛到此成空自昔英雄如今何在淚雨灑時空寂寂悲風動處冷颼颼夜闌而鬼哭神號歲久而鴉餐荒草畔漫留石緑楊中空挂紙錢下稍頭難免如斯到這裏怎生不醒寒山云雀鴉餐皮肉盡風吹日炙髑髏乾目前試問旁觀者自把形骸仔細看大家具眼休更埋頭翻身跳出迷津彈指裂開愛網休向鬼窟裏作活計要知肉團上有真人是男是女總堪修若智若愚皆有分但請回光返照便知本體元無若未能學道參禪也且勤持齋念佛捨惡歸善改往修來移六賊為六神通離八苦得八自在便好替天行化不妨代佛接人對衆為大衆宣揚歸家為一家解説使處處齊知覺悟教人人盡免沉淪上助諸佛轉法輪下拔衆生離苦海佛言不信何言可信人道不修他道難修莫教一日換了皮縱有千佛難救汝火急進步時不待人各請直下承當莫使此生空過寒山云百骸潰散離塵泥一物長靈復是誰不得此時通線路骷髏著地幾人知天台智者大師勸修行人專修淨土設問曰諸佛菩薩以大悲為業若欲救度衆生秪應願生三界于五濁三塗中救苦衆生因何求生淨土自安其身專為自利障菩提道智者答曰菩薩有二種一者久修行菩薩道得無生忍者實當斯責二者未得已還及初發心凡夫菩薩者要須常不離佛忍力成就方堪處三界內于惡世界救苦衆生故智度論云具縛凡夫有大慈心願生惡世救苦衆生者無有是處何以故惡世界煩惱強自無忍力心隨境轉聲色所縛自墮三塗焉能救衆生假令持戒修福得生人中作國王大臣富貴自在縱遇善知識不肯信用貪迷放逸廣造衆罪乘此惡業一入三塗經無量劫從地獄出受貧賤身若不逢善知識還墮地獄如此輪回至于今日人人皆如是此名難行道也故維摩經云自疾不能救而能救諸疾人又智度論云譬如二人各有親眷為水所溺一人情急直入水救為無方便力故彼此俱沒一人有方便往取船筏乘之救接悉皆得脫水溺之難新發意菩薩亦復如是未得忍力不能救衆生為此常須近佛得無生忍已方能救衆生如得船者凡夫無力唯得專念阿彌陀佛使成三昧臨終斂念得生決定不疑見彌陀佛證無生忍已還來三界乘無生忍船救苦衆生廣施佛事任意自在故論云遊戲地獄行者生彼國得無生忍已還入生死國教化地獄救苦衆生以是因緣求生淨土此名易行道也真州長蘆慈覺賾禪師勸參禪人兼修淨土夫以念為念以生為生者常見之所失也以無念為無念以無生為無生者邪見之所惑也念而無念生而無生者第一義諦也是以實際理地不受一塵則上無諸佛之可念下無淨土之可生佛事門中不捨一法則總攝諸根蓋有念佛三昧還源要術示開往生一門故經云若人聞説阿彌陀佛執持名號乃至是人終時心不顛倒即得往生阿彌陀佛極樂國土蓋以初心入道忍力未淳須託淨緣以為增上何則娑婆國土釋迦已滅彌勒未生極樂世界阿彌陀佛現在説法娑婆國土觀音勢至徒仰嘉名極樂世界彼二上人親為勝友娑婆國土諸魔競作惱亂行人極樂世界大光明中決無魔事娑婆國土邪聲雜亂女色妖淫極樂世界水鳥樹林咸宣妙法正報清淨實無女人然則修行緣具無若西方褊見緇流橫生疑謗切嘗論之此方之人無不厭俗舍之煩喧慕蘭若之寂靜故有捨家出家則殷勤讚歎而娑婆衆苦何止俗舍之煩喧極樂優遊豈止蘭若之寂靜知出家為美而不願往生其惑一也萬里辛勤遠求知識者蓋以發明大事決擇生死而彌陀世尊願力弘深一演圓音無不明契願參知識而不欲見佛其惑二也叢林廣衆皆樂棲遲少衆道場不欲依附而極樂世界一生補處其數甚多諸上善人俱會一處既欲親近叢林而不慕清淨海衆其惑三也此方之人上壽不過百歲童癡老耄疾病睡眠常居大半西方之人壽命無量一託蓮苞便獲阿惟越致即不退轉佛階決定可期流轉娑婆促景而不知淨土長年其惑四也若乃位居不退果證無生在欲無欲居塵不塵方能興無緣慈運同體悲回入塵勞其有淺聞單慧或與少善相應便謂永出四流高超十地詆訶淨土耽戀娑婆不知自是何人擬此大權菩薩其惑五也若夫信佛言而生淨土則纍繫之所不能拘劫波之所不能害謝人間之八苦無天上之五衰尚無惡道之名何況有實唯顯一乘之法決定無三蓋解脫之要門修行之捷徑無出此矣是以了義大乘無不指歸淨土前賢後聖自他皆願往生凡以欲得度人先須自度故也嗚呼人無遠慮必有近憂一失人身萬劫深悔故率大海衆各念彌陀佛則十萬遙程不勞而至矣杭州永明壽禪師戒無證悟人勿輕淨土設問曰但見性悟道便超生死何用繫念彼佛求生他方答曰真修行人應自審察如人飲水冷暖自知諸仁者當觀自己行解見性悟道能如馬鳴龍樹否得無礙辨才證法華三昧能如天台智者否宗説皆通行解兼修能如忠國師否此諸大士皆明垂言教深勸往生蓋是自利利他豈肯誤人自誤況往生傳所載古今高士事迹顯著非一宜勤觀覽以自照知又當自度臨命終時生死去住定得自在否自無始來惡業重障定不現前此一報身定脫輪回否三塗惡道異類中行出沒自由定無苦惱否天上人間十方世界隨意寄託定無滯礙否若也了了自信得及何善如之若其未也莫以一時貢高却致永劫沉淪自失善利將復誰尤嗚呼哀哉何嗟及矣蓮池大師序勸往生世尊始成正覺為諸有情普演佛乘既而機難盡投于一乘中示三乘法而復于三乘中出淨土一門今去佛日遠進之不能發神解超聖階退之倀倀乎有淪墜之患而匪仗此門其何從疾脫生死大矣哉可謂起末世之沉痾必效之靈藥也顧古之效多今之效鮮其咎安在則亦口淨土心娑婆而堅勇明悟不及前輩云爾昔有傳往生者歲久滅沒豫于斷章遺迹中摘其因果昭灼者積之成編俾緇素之流確知某也以如是解脫而生某也以如是純一而生某也以如是精誠之極感格而生某也以如是大悲大願而生某也以如是改過不吝轉業于將墮也而生某如是上生某如是中生下生庶幾乎考古驗今為淨業者左券客有過我者閲未數傳勃然曰淨土唯心心外無土往生淨土寓言也子以為真生乎哉寧不乖于無生之旨豫俟其色定徐而謂曰談何容易如以無生而已一切斷滅不應尚有唯心果悟無生則終日生而未嘗生也且爾已盡漏心否乎對曰不能噫漏心未盡則生緣未休生緣未休則托質有所茫茫三界大苦海中不生淨土而生何土六道之匍匐九品之逍遙相去殆天淵矣飾虗論而爭高吾弗為之即淨土而之佛乘未嘗間隔絲毫而奚乖之有客乃惘然自失亟請梓焉丞相鄭清之勸修淨土文人皆謂修淨土不如禪教律余獨謂禪教律法門莫如修淨土夫真淨明妙虗徹靈通凡在智愚皆具此性故釋氏以禪教律假設方便使之從門而入俱得超悟惟無量壽佛獨出一門曰修行淨土如單方治病簡要直截一念之專即到彼岸不問緇白皆可奉行但知為化愚俗淺近之説其實則成佛道捷徑之途今之學佛者不過禪教律究竟圓頓莫如禪非利根上器神領意解者則未免墮頑空之失研究三乘莫如教非得魚忘筌因指見月者未免鑽故紙之病護善遮惡莫如律非身心清淨表裏如一者未免自纏縛之苦其不由禪教律而得戒定慧者唯淨土一門乎方念佛時口誦心惟諸惡莫作豈非戒繫念淨境幻塵俱滅豈非定念實無念心華湛然豈非慧人能屏除萬慮一意西方則不施棒喝而悟圓頓機不閲大藏經而得正法眼不持四威儀中而得大自在不垢不淨無纏無脫當是時也孰為戒定慧孰為禪教律我心佛心一無差別此修淨土之極致也八功德水金蓮華臺又何必疑哉廬陵李彥弼夢記彥弼乾道癸巳家染疫疾四月五日彥弼亦病粥藥不進至十九日早夢一人褐衣神貌清癯以手撫摩彥弼肢體而呼令速起彥弼惕然問曰公何人耶答曰豫即龍舒也彥弼因告以疾病雖欲支持莫能將何以愈其疾乎公曰記省闕仲雅教汝捷徑否彥弼曰然每日持誦阿彌陀佛不輟公曰汝起食白粥即可既寤索粥食之病果隨愈後見龍舒畫像儼然如夢中見者彥弼稔聞居士誨人不倦所至學者輻輳謝君以靜逸堂待之正月十一日令子姪往承其教不久回云居士夜來講書罷如常持誦禮佛至三鼓忽厲聲念阿彌陀佛數聲云佛來接我言訖立化是夕人有夢二青衣引公向西而行傳為勝異居士未示寂滅前三日遍囑諸人勉進道業有此後不復再見之語自非功力精深達乎生死者未易臻此彥弼一病垂死荷居士陰賜拯接遂獲平愈可謂生死骨肉者矣或曰夢因想成然食白粥之效安可誣也謹刻公像并著感應事迹用廣其傳非敢飾辭以惑耳目伏冀見聞敬信同霑利益公姓王名日休字虗中號龍舒居士云是歲下元廬陵李彥弼謹記
