body:
  text: 淨土全書序蓋聞願生淨土者必先淨其心其心淨則其土淨也欲淨其心者必專精其法其法專則其功純也往生淨土之書實浩且繁其持名之專用功之精莫尚於王龍舒淨土文矣余昔嘗閲其書每置卷三歎欲廣流通俾九州四海若緇若素若男若女有厭離娑婆極苦而欣羡安養極樂者皆得攝百千萬億三昧於一念佛三昧中十二時間純而弗雜約而易操力省功倍期孚效速華開見佛永脫輪回則此書誠為破障之前陳割惑之利鋒淨域之寶筏入聖之要津與茲棲水俞惠公居士復原本龍舒博綜經論彚為全書既以自利兼以利他觀其直捷信向願力弘厚可謂入海而取明月之珠登山而採連城之璧無以加矣刻成乞余一言以為序余固知法專而后功純功純而后心淨心淨而后土淨其將旦暮而遇之也寧止多善根多福德多因緣而已哉康熙三年仲秋之月報恩琇頭陀題淨土全書序安養國法王子之言曰淨念相繼得三摩地即淨土心不必淨土歟曰勢至菩薩欲入於微塵內轉根本法輪識淨土成住有因也曹溪大師之言曰東方人求生西方西方人求生何國即求生不必往生歟曰盧祖慮人於一真界起爾我諍端明淨土跬步可到也是故黃童白叟不論年華屋蓽門不論地動靜間忙不論時無人非念佛人無地非念佛地無時非念佛時然則一切人是佛本來人一切地是佛降生地一切時是佛成道時聲聲是佛聲念念是佛念龍舒居士於淨土三昧倏然而起歡喜合掌而告我言棲水善里有大長者現淨清身與我某甲分座説法令諸衆生同行佛行同堅佛願同證佛心同生佛土靈山老人為作證明山僧不覺手舞足蹈敬書是語於其簡端康熙甲辰初冬日靈隱弘禮題於直指堂中淨土全書序禪宗自達磨西來派傳五葉燈續千秋其間大智利根一聞徹悟妙證無上者固多若凡夫之人根器頑鈍雖菩提種子當身具足而雲深霧重推蕩不開對以癡漢乃欲以棒喝喚醒是猶以盲詔盲纍劫難明安在其為大慈父耶釋迦如來為是特説彌陀一經單指念佛往生前哲如慧遠首結蓮社中峯深懷淨土宣暢念佛法門向慕西方極樂大抵從凡夫所貪著處猛然善誘解者不敢以為非昧者深以為可喜蓋無智無愚大共極便之途也奈何末法浸衰本原漸晦即知念佛可以往生究不識所念何佛遂令西方有億萬之遙苦海無回頭之樂豈知所謂念佛者非徒以齒舌也念念是心念念是佛才一動念西方即爾現前才一現前是名極樂世界然則念佛往生之説其諸即心即佛之謂與以為提宗離念何處尋宗以為直證舍佛將何作證是知列祖傳燈頓超生死衆生篤信遂脫輪回其歸一也近代蓮池大師重開捷徑啓迪愚迷今復澤邈而誨湮矣茲寶蓮俞君慮安養之虗懸憫塵沙之罔覺仰企龍舒之懿訓宏參經傳之元詮彚為一書其文博而不繁其義括而無隱殆以嗣揚至教而廣接群蒙于弗墜者哉豫不敏諷覽終編頓生歡喜而為之言康熙乙巳仲春既望狀元四明史大成謹序淨土全書序淨土之説肇自阿彌陀佛慈願弘開彰于釋迦牟尼佛特告阿難其言非妄故西土傳教流入中華翕然遵信如響應聲至晉慧遠祖師及劉遺民諸君結蓮社百餘人篤信專修其中感佛來迎脫生淨土者不勝屈指嗣後隋有智者魏有曇鸞唐有善導五會臺岩大振宗風逮宋永明省常慈照諸師勸修益勵及王龍舒先生嚮往愈堅修持愈篤臨終立化淨土之歸較然矣自利利他著淨土文十三卷以詔來學歲久板翳呂元益重為刊梓欲壽其傳刊至四卷第九第十板迸出舍利三顆見之呂師説序中章章可考此皆精誠所感示現神通孰謂佛法無靈驗耶明蓮池大師亦每每導人念佛往生其教稍廣豫生也晚間嘗竊聞其説而未悉其指近得龍舒淨土文虔誦詳覽恍然見先生一片婆心真法寶中度世之慈航也然此書大都接引中下居多其文浩繁恐根鈍者不能豁然生信竊不自揣括其要旨畫為淨土定式刊板流通普勸道俗猶慮淨土之蘊未大備也更博采諸經及餘尊宿所緒論輯為全書以擴見聞所以啓人之信破人之疑鼓邁往之志䇿鋭進之階者視前哲為粗備冀令娑婆世界衆生人人信向七寶池中蓮花日日發生庶幾淨土一門永播恆沙于無量焉爾康熙三年甲辰仲夏寶蓮道人俞行敏謹題勸修淨土啓竊以學佛初機大悲自菩薩心印利他要行誘進乃淨業勝因晉社羣賢願偕生於極樂十方海衆宜彚於娑婆痛生死之難逃嘆無常之甚速敢不景仰前哲鼓倡當來勸一人以至多人布沙門之法施念一佛以至億佛適淨土之慈航勉爾同儕深植善本常為道侶勤䇿真功一夫退惰則協力提撕一子遐升則交相接引庶使衆生不永滯乎迷途且令善信咸慶登夫寶所若徒知而不修纍葉常沉黑獄苟推已而行化現身即是彌陀敢冀弘仁轉加喚醒立時下手猛地回頭一生遂補佛處曠劫不染纖塵斯誠超脫輪回之捷徑而直馳安養之康衢也寶蓮道人謹啓淨土文序阿彌陀如來以大願力攝受羣品繫念甚簡證果甚速或者疑之余嘗為之言阿彌陀佛即汝性是極樂國土即汝心是衆生背覺合塵淪於七趣立我與佛天地懸隔佛為是故慈悲方便開示悟入現諸無量如幻三昧莊嚴其國備極華好復以辨智而為演説令諸衆生歡喜愛樂於日用中能發一念念彼如來欲生其國即此一念清淨堅固還性所有與佛無異當是念時不起於坐阿彌陀佛極樂國土悉皆現前如是修習乃至純熟幻身壞時此性不壞金蓮華臺由性種生往生其中如歸吾廬諸佛菩薩即我眷屬性無異故自相親愛友人龍舒王虗中端靜簡潔博通羣書訓傳六經諸子數十萬言一旦捐之曰是皆業習非究竟法吾其西方之歸自是精進惟佛惟念年且六十布衣蔬茹重趼千里以是教人風雨寒暑弗皇恤間居日課千拜夜分乃寢面目奕奕有光望之者信其為有道之士也紹興辛巳秋過家君於宣城留兩月始見其淨土文凡修習法門與感驗章著具有巔末將求信道鋟木傳焉諉豫序其書故為之題其端云虗中名日休十月旦狀元歷陽張孝祥序重刊龍舒淨土文序華嚴經云信為道元功德母長養一切諸善根然世之所謂修淨土者不可以不信也淨土乃西方極樂世界其中種種殊勝莊嚴阿彌陀經載之詳矣阿彌陀乃彼中之佛未成佛以前有四十八願願願度人衆生願生彼國者一稱其名隨念往生末世之人皆於命終氣絶之後令他人稱念十聲謂之十念何益於事却不知於平日諸惡莫作衆善奉行念念不離西方淨土念念願見彼佛彌陀直至命終不差不亂蓮臺上品決定化生五濁惡世更不再入但闡提之人不信有之被惡業昏翳既不能自修又障他人修此入地獄如箭射誠可憫也譬如遐絶域之人居處服食極其荒涼安知有中國富貴快樂一旦或有語之者咸以為妄其中乃至一人聽而信之念慕中國大厭彼土願身沒而生焉今生中國之人豈無若輩乎此世界中豈無遐絶域乎既有南贍部洲便有西方淨土捨此生彼亦理之常烏得而不信哉諸佛無妄語佛語不誤人先賢達士及禪門宗師亦多修淨土惟龍舒王居士信之篤修之勤正念現前臨終明白淨土之歸無疑矣自利利他又作淨土文十三卷引三教經書為證方便利益開導後人可謂一念萬年歲久板翳不任披閲吾侄呂元益遜齋自號康廬隱客乃先兄道山左丞之子夙植善本來生我家行己立身靡不在道飢寒病苦周恤有恆道釋諸經印施饒益修行淨業惟已自知發心重為刊梓欲壽其傳願一切衆生悉歸淨土刊至第四卷第九第十板鐵筆有礙迸出舍利三顆嵌罅深隱光彩熣燦衆驚異焉此皆阿彌陀佛悲智示現龍舒居士願力不泯吾侄信心堅固所致謂佛法無靈驗西方無淨土可乎延祐三年歲次丙辰中秋同修淨土信士奉訓大夫前江淮等處財賦都總府副總管古壽呂師説書於潯陽寓舍之信堂重刊龍舒淨土文序豫嘗閲龍舒淨土文知王居士之用心普度一切兼攝三乘而其接中下二根之功為最多何者蓋此事本來現成不假修證才涉有想便落第二義而世之人不皆上根利器也非示以起信修持之方證以現世感應之迹則其能無所緣而發心者鮮矣此淨土文乃修行之捷徑如肯心信受則無論根器利鈍持習淺深現世末後均得證果誠世之所不可無者或者以十聲念佛恐未能深入三昧觀想不純未必臨終受用殊不知世界皆從想生遂成幻有何況專修淨土者終身禮拜注念而不能隨意往生必無是理也惟直截根原之士頓空諸幻者無需乎此而一切初地學人舍是則如盲不任杖倀倀何之豫故謂居士接中下二根之功為最多在在處處不可無此書也萬曆二年歲次甲戌仲秋吉日紫雲山人宗門後學操守經書佛祖因緣鼓音王經云過去久遠劫中有國名妙喜王名憍尸迦祖父清泰國王父月上轉輪王母殊勝妙顏皇后生三子長曰月明次曰憍尸迦三曰帝衆時有一佛出世號世自在王如來憍尸迦棄舍國位投佛出家名曰法藏比丘恭對如來發四十八種廣大行願普度十方一切衆生若一願不滿者誓不作佛是時諸天散華大地震動空中讚言決定成佛號阿彌陀悲華經云往昔劫中有轉輪王名無諍念大臣寶海為善知識同于寶藏佛所發願輪王云我作佛時在於清淨安樂世界攝受一切衆生大臣云我作佛時在於五濁苦惱世界度脫一切衆生無諍念王者阿彌陀佛是也寶海大臣者釋迦牟尼佛是也似此君臣道合名為攝折二門是故阿彌陀佛在彼淨土接引衆生釋迦牟尼佛在此娑婆教化衆生柔軟自墮者宜以攝受法門化之如説安養功德莊嚴等剛強自是者宜以折伏法門度之如説娑婆苦難升沉等菩薩因緣悲華經又云爾時寶藏如來復告第一不眴太子即轉輪王之子今當號汝為觀世音無量壽佛般涅槃此云入寂滅後當成佛道號普光功德山如來又告第二尼摩太子次當作佛號善住功德寶王如來汝以願力取清淨土復號汝為大勢至大阿彌陀經云佛言彼佛即阿彌陀至般泥洹即涅槃時觀世音菩薩乃當作佛掌握化權教化度脫十方世界諸天人民以至蜎飛蠕動之類皆令得泥洹之道轉相教化度脫一如大師阿彌陀佛無有窮極復往無央數劫乃般泥洹其次大勢至作佛掌握化權教化度脫一如阿彌陀佛經歷劫數永無般泥洹時淨土全書目次卷上序佛祖因緣菩薩因緣淨土原始淨土起信淨土定式修持要約淨土扶迷卷下淨土果證沙門往生類王臣往生類處士往生類尼衆往生類婦女往生類惡人往生類畜生往生類念佛現應淨土全書目次終
